<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Revista de Iniciação Científica Ser!</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #ffffff; 
            margin: 0;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }
        .academic-title { font-family: 'Playfair Display', serif; }
        .modern-title { font-family: 'Inter', sans-serif; font-weight: 900; }
        
        .bg-hero-carousel {
            background-size: cover;
            background-position: center;
            transition: all 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .fade-in-up {
            animation: fadeInUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); filter: blur(10px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }

        .slide-content-enter {
            animation: slideIn 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(40px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .hover-lift {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .hover-lift:hover {
            transform: translateY(-8px) scale(1.01);
            box-shadow: 0 30px 60px -12px rgba(15, 23, 42, 0.2);
        }

        .img-paper-shadow {
            box-shadow: 0 25px 60px -15px rgba(15, 23, 42, 0.3);
            transition: all 0.6s ease;
        }

        /* Efeito de quina dobrada na capa - Versão Realista e Opaca */
        .magazine-curl-container {
            position: relative;
            cursor: pointer;
        }

        .curl-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
            border-radius: 0.125rem;
        }

        .curl-wrapper::after {
            content: "";
            position: absolute;
            bottom: 0;
            right: 0;
            width: 0;
            height: 0;
            /* Gradiente branco sólido para simular o verso do papel */
            background: linear-gradient(135deg, 
                transparent 50%, 
                #f3f4f6 50%, 
                #ffffff 65%,
                #ffffff 100%);
            /* Sombra interna para dar volume ao levantamento do papel */
            box-shadow: -4px -4px 12px rgba(0, 0, 0, 0.25);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
            z-index: 20;
        }

        .magazine-curl-container:hover .curl-wrapper::after {
            width: 90px;
            height: 90px;
        }

        .pdf-viewer-container {
            width: 100%;
            max-width: 1000px;
            height: 80vh; 
            min-height: 500px;
            background: #1a1f2e;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.6);
            position: relative;
        }
        
        @media (max-width: 640px) {
            .pdf-viewer-container {
                height: 70vh;
                min-height: 450px;
            }
        }

        .magazine-transition {
            transition: transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.6s ease, filter 0.6s ease;
            will-change: transform, opacity;
        }

        .btn-shimmer {
            position: relative;
            overflow: hidden;
        }
        .btn-shimmer::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent);
            transform: rotate(45deg);
            transition: 0.8s;
            pointer-events: none;
        }
        .btn-shimmer:hover::after {
            left: 150%;
        }

        .btn-action-pulse {
            animation: pulse-action 2s infinite;
        }
        @keyframes pulse-action {
            0% { box-shadow: 0 0 0 0 rgba(79, 70, 229, 0.7); }
            70% { box-shadow: 0 0 0 20px rgba(79, 70, 229, 0); }
            100% { box-shadow: 0 0 0 0 rgba(79, 70, 229, 0); }
        }

        .video-container {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 */
            height: 0;
            overflow: hidden;
            border-radius: 24px;
            background: #000;
        }
        .video-container iframe, .video-container video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: #f8fafc; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 5px; border: 2px solid #f8fafc; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback, useRef } = React;

        // --- CONFIGURAÇÃO DE IMAGENS E MÍDIA ---
        const IMAGES = {
            top_banner: "https://lh3.googleusercontent.com/u/0/d/1-J2lO3tufWEXNdFDbvbUaHBNqABjOPqe=w1600",
            overlay_logo: "https://lh3.googleusercontent.com/u/0/d/15x27AzxW9GANulDbLrYlqzRC6obRAXMI=w1600",
            cover_2024: "https://lh7-rt.googleusercontent.com/sitesz/AClOY7pz2nRa1cCyR4ZTGfEK8WJ39oLERNS7PJEA42mtm9rYDl8ms-6_shb9Zm2SgI2CRO_SjBY9MIuyB5gcbV0ut-zOo_-gzE2jZrjGL5GDvnLs738q3ajmJHTYoK-62PM_CC7xKkoMJmE35WdMMOLbRQ-GXp9a0fBtsYgKWkf1Wdr-QPnHAlk?key=aCpffzizo07AapIHHMuf7A",
            event_video_url: "https://drive.google.com/file/d/1ofr-zpluxaNtkGjM82pDGy-sFgMAXWYZ/preview"
        };

        const ARTICLES_DATA = [
            { id: "propaganda", title: "Como a propaganda influencia os jovens contemporâneos", area: "Sistema Mundo", prof: "Naia Godoy Padovanni", authors: "Laura Almeida Duarte, Manuella Guimaro, Maria Eduarda Medeiros", bg: "https://lh3.googleusercontent.com/u/0/d/1MRcxEyyQbnOjy7TFA_RIzls0RkLWBApl=w1600", pdf: "https://drive.google.com/file/d/1X92V3yBTVRB_jnBhNRvzfvM4i1rIRzWe/preview", banner: "https://drive.google.com/file/d/1MRcxEyyQbnOjy7TFA_RIzls0RkLWBApl/view" },
            { id: "tecnologia", title: "Tecnologia e a organização empresarial", area: "Análise de Dados", prof: "Adriano Ortiz Souza", authors: "Ana Cristina Borges Martinis, Isadora Almeida Viveiros, Júlia de Souza", bg: "https://lh3.googleusercontent.com/u/0/d/1FNNBHpe5mIkRyhrNKjnRylqZQQTIcqj-=w1600", pdf: "https://drive.google.com/file/d/1JFnvQbYIA_lEDLD1AXMG_zDxt5xNoSsV/preview", banner: "https://drive.google.com/file/d/1FNNBHpe5mIkRyhrNKjnRylqZQQTIcqj-/view" },
            { id: "regicide", title: "Desenvolvimento do Jogo Regicide", area: "Análise de Dados", prof: "Adriano Ortiz Souza", authors: "Gabriel Garcia Flores", bg: "https://lh3.googleusercontent.com/u/0/d/1C0SuSb4ra1sQGwTQg5-SQIoZ3Vf9U6fF=w1600", pdf: "https://drive.google.com/file/d/1RZwnf4e0SEQvaH3b8pJpgRTEDTs8wv9R/preview", banner: "https://drive.google.com/file/d/1C0SuSb4ra1sQGwTQg5-SQIoZ3Vf9U6fF/view" },
            { id: "foguete", title: "Eco-Foguete: Dispersão de sementes", area: "Meio Ambiente", prof: "Gabriel Costa Soares", authors: "Isabela Mir de Campos Corrêa, Victor Cano Ronzani Pereira, Maria Eduarda Ramos Tagliaferro", bg: "https://lh3.googleusercontent.com/u/0/d/1Gz8kxtvNWUle02Hw2X3YmPFhG3zuyhPR=w1600", pdf: "https://drive.google.com/file/d/1WsYPze9P6WRoRWDL18A07xvElUgLXJ_h/preview", banner: "https://drive.google.com/file/d/1Gz8kxtvNWUle02Hw2X3YmPFhG3zuyhPR/view" },
            { id: "valvula", title: "Válvula de Controle Remoto", area: "Maker", prof: "Jose Eduardo Xavier", authors: "Nicolas Dias da Silva Carravero, João Vitor Israel de Oliveira Annibaldi, Lorenzo Pederiva Leite", bg: "https://lh3.googleusercontent.com/u/0/d/1teyhwUnb2x50RDN4P6e7K6Q_3fHBodgv=w1600", pdf: "https://drive.google.com/file/d/1n_TwNW_4W2Ie85CZ-m-wlWy-tfZsdGBM/preview", banner: "https://drive.google.com/file/d/1teyhwUnb2x50RDN4P6e7K6Q_3fHBodgv/view" },
            { id: "vento-ionico", title: "Geração de vento iônico", area: "Maker", prof: "Daniel Alisson Cardoso", authors: "Brenda Martines Tavares, Maria Eduarda de Santana Souza", bg: "https://lh3.googleusercontent.com/u/0/d/1fYyrVo2oTrNtXGpDgS8DY31mzMFOMWC8=w1600", pdf: "https://drive.google.com/file/d/1qUog4169272MvcUIaNxJEpPGDhA6IVpo/preview", banner: "https://drive.google.com/file/d/1fYyrVo2oTrNtXGpDgS8DY31mzMFOMWC8/view" },
            { id: "extremismo", title: "Disseminação de ideias extremistas", area: "Sistema Mundo", prof: "Naia Godoy Padovanni", authors: "Luísa Murata, João Botto, Ana Sofia Gretzitz, Eduardo Domingues, Lívia Todesco, Lavínia Welter", bg: "https://lh3.googleusercontent.com/u/0/d/1COBgBrgXH2XU4xzEgq15_WJ1lJmFceUp=w1600", pdf: "https://drive.google.com/file/d/1UMUjADuxJOip39tZjzvuoxgY16vdWMGS/preview", banner: "https://drive.google.com/file/d/1COBgBrgXH2XU4xzEgq15_WJ1lJmFceUp/view" }
        ];

        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => { if (window.lucide) lucide.createIcons(); }, [name]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        const App = () => {
            const [view, setView] = useState('home'); 
            const [selectedArticle, setSelectedArticle] = useState(null);
            const [activeSlide, setActiveSlide] = useState(0);
            const [activeMagazineYear, setActiveMagazineYear] = useState(2024);
            const [searchQuery, setSearchQuery] = useState('');
            const [progress, setProgress] = useState(0);

            // FUNÇÕES DE NAVEGAÇÃO
            const goHome = useCallback(() => {
                setView('home');
                setSelectedArticle(null);
                setSearchQuery('');
                window.scrollTo(0, 0);
            }, []);

            const openCatalog = useCallback(() => {
                setView('catalog');
                setSelectedArticle(null);
                window.scrollTo(0, 0);
            }, []);

            const navigateTo = useCallback((page, article = null) => {
                setSelectedArticle(article);
                setView(page);
                window.scrollTo(0, 0);
            }, []);

            const nextSlide = useCallback(() => {
                setActiveSlide((prev) => (prev + 1) % ARTICLES_DATA.length);
                setProgress(0);
            }, []);

            const prevSlide = useCallback(() => {
                setActiveSlide((prev) => (prev - 1 + ARTICLES_DATA.length) % ARTICLES_DATA.length);
                setProgress(0);
            }, []);

            // Auto-play do Carrossel
            useEffect(() => {
                if (view !== 'home') return;
                const timer = setInterval(() => {
                    setProgress((prev) => {
                        if (prev >= 100) {
                            nextSlide();
                            return 0;
                        }
                        return prev + 0.5;
                    });
                }, 30);
                return () => clearInterval(timer);
            }, [view, nextSlide]);

            const filteredArticles = useMemo(() => {
                const query = searchQuery.toLowerCase().trim();
                if (!query) return ARTICLES_DATA;
                return ARTICLES_DATA.filter(art => 
                    art.title.toLowerCase().includes(query) ||
                    art.authors.toLowerCase().includes(query) ||
                    art.prof.toLowerCase().includes(query) ||
                    art.area.toLowerCase().includes(query)
                );
            }, [searchQuery]);

            // --- VISTAS INTERNAS ---

            const renderCatalog = () => (
                <div className="w-full min-h-screen bg-[#f8fafc] page-transition text-left text-slate-900">
                    <div className="bg-[#151c32] text-white py-10 sm:py-16 px-4 sm:px-12 shadow-2xl relative overflow-hidden">
                        <div className="absolute top-0 right-0 w-96 h-96 bg-indigo-600/10 rounded-full blur-3xl -translate-y-1/2 translate-x-1/2"></div>
                        <div className="max-w-6xl mx-auto flex flex-col md:flex-row md:items-end justify-between gap-8 relative z-10">
                            <div className="text-left slide-content-enter">
                                <button onClick={goHome} className="flex items-center gap-2 text-indigo-400 font-black uppercase text-[10px] tracking-widest mb-6 hover:text-indigo-300 transition-all active:translate-x-[-4px]">
                                    <Icon name="arrow-left" size={14} /> Voltar ao Início
                                </button>
                                <h1 className="academic-title text-3xl sm:text-5xl font-black mb-1 uppercase leading-none">Biblioteca Ser!</h1>
                                <p className="text-indigo-200/60 text-sm sm:text-base font-light mt-3 tracking-wide max-w-xl text-indigo-200">Acervo completo das produções intelectuais desenvolvidas pelos nossos alunos.</p>
                            </div>
                            <div className="bg-white/10 px-5 py-4 rounded-2xl sm:rounded-3xl border border-white/10 flex items-center gap-4 w-full md:max-w-md shadow-2xl backdrop-blur-xl group focus-within:ring-2 ring-indigo-500 transition-all">
                                <Icon name="search" size={20} className="text-indigo-400 group-focus-within:scale-110 transition-transform" />
                                <input type="text" value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} placeholder="Pesquisar trabalho..." className="bg-transparent border-none text-white text-sm focus:outline-none w-full placeholder-white/30 font-medium" />
                                {searchQuery && <button onClick={() => setSearchQuery('')} className="text-white/40 hover:text-white transition-all"><Icon name="x" size={18}/></button>}
                            </div>
                        </div>
                    </div>
                    <div className="max-w-7xl mx-auto px-4 sm:px-12 py-10 sm:py-24 text-left">
                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 sm:gap-10 text-left">
                            {filteredArticles.map((art, index) => (
                                <div key={art.id} className="bg-white rounded-[2rem] overflow-hidden shadow-sm border border-slate-100 hover-lift group fade-in-up text-left" style={{ animationDelay: `${index * 0.05}s` }}>
                                    <div className="h-44 sm:h-56 overflow-hidden relative">
                                        <img src={art.bg} className="w-full h-full object-cover transition-transform duration-1000 group-hover:scale-110" alt={art.title} />
                                        <div className="absolute inset-0 bg-gradient-to-t from-slate-900/90 via-slate-900/20 to-transparent flex items-end p-5 sm:p-6 text-white text-left">
                                            <span className="text-[9px] font-black bg-indigo-600 text-white px-3 py-1.5 rounded-lg uppercase tracking-widest">{art.area}</span>
                                        </div>
                                    </div>
                                    <div className="p-6 sm:p-8 text-left text-slate-900 font-black">
                                        <h3 className="academic-title text-lg sm:text-xl font-bold text-slate-800 mb-3 leading-tight min-h-[3rem] line-clamp-2 uppercase italic text-left">{art.title}</h3>
                                        <p className="text-[11px] text-slate-500 font-medium italic mb-6 line-clamp-1 border-l-2 border-indigo-100 pl-3 text-left">{art.authors}</p>
                                        <div className="flex items-center gap-2 text-slate-400 text-[10px] font-black uppercase mb-8 pt-4 border-t border-slate-50 text-left"><Icon name="user-check" size={14} className="text-indigo-400" /> Prof. {art.prof}</div>
                                        <div className="grid grid-cols-2 gap-3 sm:gap-4 text-left">
                                            <button onClick={() => navigateTo('reader', art)} className="bg-[#151c32] text-white py-3 sm:py-3.5 rounded-2xl font-black text-[10px] uppercase hover:bg-indigo-600 transition-all active:scale-95 shadow-lg flex items-center justify-center">Ler Artigo</button>
                                            <button onClick={() => navigateTo('banner', art)} className="bg-slate-50 text-slate-700 py-3 sm:py-3.5 rounded-2xl font-black text-[10px] uppercase hover:bg-slate-200 transition-all active:scale-95 border border-slate-100 flex items-center justify-center font-bold">Ver Banner</button>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );

            const renderReader = () => (
                <div className="w-full min-h-screen bg-[#0f172a] page-transition flex flex-col items-center">
                    <div className="w-full bg-[#1e293b]/80 backdrop-blur-xl px-3 sm:px-6 py-4 flex items-center justify-between border-b border-white/5 sticky top-0 z-[100] text-white font-black text-left">
                        <div className="flex items-center gap-3 flex-1 overflow-hidden">
                            <button onClick={() => setView('catalog')} className="p-2 hover:bg-white/10 rounded-full text-white transition flex items-center justify-center shrink-0"><Icon name="arrow-left" size={24} /></button>
                            <div className="text-left text-white truncate max-w-full">
                                <h2 className="academic-title text-sm sm:text-lg font-bold truncate text-white">{selectedArticle.title}</h2>
                                <p className="text-[9px] sm:text-[10px] text-indigo-400 font-black uppercase tracking-widest mt-1">Edição 2024</p>
                            </div>
                        </div>
                        <div className="flex items-center gap-3">
                            <a href={selectedArticle.pdf.replace('/preview', '/view')} target="_blank" rel="noopener noreferrer" className="bg-indigo-600 text-white px-3 sm:px-5 py-2.5 rounded-xl font-black text-[9px] sm:text-xs uppercase hover:bg-indigo-500 transition-all shadow-xl btn-action-pulse text-white font-black"><Icon name="maximize-2" size={14} /> TELA CHEIA</a>
                        </div>
                    </div>
                    <div className="flex-grow w-full p-2 sm:p-10 flex flex-col items-center bg-[#0a0d1a]">
                        <div className="pdf-viewer-container fade-in-up"><iframe key={`pdf-${selectedArticle.id}`} src={`${selectedArticle.pdf}?authuser=0`} className="w-full h-full border-none" allow="autoplay"></iframe></div>
                    </div>
                </div>
            );

            const renderBanner = () => (
                <div className="w-full min-h-screen bg-[#0f172a] page-transition flex flex-col items-center text-white">
                    <div className="w-full px-3 sm:px-6 py-4 flex items-center justify-between border-b border-white/5 bg-[#1e293b]/80 backdrop-blur-xl sticky top-0 z-50 text-white font-black text-left">
                        <button onClick={() => setView('catalog')} className="text-white/60 hover:text-white flex items-center gap-2 text-[10px] font-bold uppercase tracking-widest transition text-white font-black"><Icon name="arrow-left" size={18} /> Voltar à Revista</button>
                        <h2 className="academic-title text-white text-xs sm:text-xl font-bold uppercase tracking-tight text-center text-white font-black">Visualização de Banner</h2>
                        <a href={selectedArticle.banner} target="_blank" rel="noopener noreferrer" className="bg-indigo-600 text-white px-3 py-2.5 rounded-xl transition shadow-lg btn-action-pulse text-white font-black"><Icon name="maximize-2" size={14} /> TELA CHEIA</a>
                    </div>
                    <div className="flex-grow w-full max-w-7xl mx-auto flex flex-col lg:grid lg:grid-cols-12 gap-8 p-6 items-center text-left text-white font-black text-left">
                        <div className="w-full lg:col-span-8 flex justify-center group fade-in-up text-left text-white">
                            <div className="relative bg-slate-900 rounded-2xl p-1.5 border border-white/10 shadow-2xl overflow-hidden text-center text-white">
                                <img src={selectedArticle.bg} className="w-full h-auto rounded-xl max-h-[50vh] lg:max-h-[75vh]" alt="Banner" />
                            </div>
                        </div>
                        <div className="w-full lg:col-span-4 bg-white/[0.03] backdrop-blur-xl p-8 rounded-[2rem] border border-white/10 text-left text-white font-black">
                            <h3 className="academic-title text-2xl font-bold mb-4 uppercase italic text-white text-left font-black">{selectedArticle.title}</h3>
                            <div className="space-y-6 text-slate-200">
                                <div className="bg-white/[0.02] p-4 rounded-2xl border border-white/5 text-left text-slate-200"><div className="flex items-center gap-2 text-slate-400 text-[9px] uppercase font-bold tracking-widest mb-2 text-indigo-400"><Icon name="users" size={12} className="text-indigo-400" /> Autoria</div><p className="text-sm font-medium italic text-slate-200 text-left">{selectedArticle.authors}</p></div>
                                <div className="grid grid-cols-2 gap-4 pt-4 border-t border-white/5 text-left text-white">
                                    <div className="text-left font-bold"><div className="text-slate-400 text-[9px] uppercase font-bold tracking-widest mb-1 text-indigo-400">Itinerário</div><div className="text-indigo-200 font-bold uppercase text-xs">{selectedArticle.area}</div></div>
                                    <div className="text-right font-bold"><div className="text-slate-400 text-[9px] uppercase font-bold tracking-widest mb-1 text-indigo-400 text-right">Orientador</div><div className="text-slate-200 font-bold uppercase text-xs">{selectedArticle.prof}</div></div>
                                </div>
                            </div>
                            <div className="mt-10 flex flex-col gap-4 text-left">
                                <button onClick={() => navigateTo('reader', selectedArticle)} className="w-full bg-indigo-600 text-white font-black py-4 rounded-2xl uppercase text-xs transition-all shadow-xl btn-shimmer flex items-center justify-center gap-3">
                                    <Icon name="file-text" size={18} /> Ler Artigo Completo
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );

            // --- VISTA INICIAL ---
            const renderHome = () => (
                <div className="text-left page-transition w-full bg-white font-black text-left">
                    {/* 1. BANNER PRINCIPAL COM LOGO POR CIMA */}
                    <div className="w-full fade-in-up relative leading-[0] block text-left">
                        <img src={IMAGES.top_banner} alt="Banner Revista Científica" className="w-full h-auto object-cover border-b border-slate-100" />
                        <div className="absolute top-0 left-0 w-full p-4 sm:p-10 flex justify-center sm:justify-start pointer-events-none">
                            <img src={IMAGES.overlay_logo} alt="Logo Colégio Ser!" className="h-10 sm:h-28 w-auto object-contain drop-shadow-xl" />
                        </div>
                    </div>

                    {/* 2. SECÇÃO DE BOAS-VINDAS */}
                    <section className="py-12 sm:py-24 px-4 sm:px-12 text-center text-slate-900 fade-in-up bg-white text-center text-slate-900 font-black">
                        <div className="inline-flex items-center gap-3 mb-6 sm:mb-8 text-indigo-600 font-black">
                            <div className="h-px w-6 sm:w-16 bg-indigo-600"></div>
                            <span className="text-[10px] sm:text-[11px] font-black uppercase tracking-[0.5em] text-indigo-600 font-bold">Apresentação</span>
                            <div className="h-px w-6 sm:w-16 bg-indigo-600"></div>
                        </div>
                        <h2 className="academic-title text-4xl sm:text-7xl font-black text-[#151c32] mb-6 sm:mb-10 leading-tight uppercase text-center">Revista de <br/><span className="text-indigo-600 italic">Iniciação Científica Ser!</span></h2>
                        <p className="text-slate-500 text-lg sm:text-2xl font-light max-w-4xl mx-auto text-balance text-center text-slate-500 font-black">A excelência acadêmica e o rigor científico dos nossos Itinerários Formativos.</p>
                    </section>

                    {/* 3. SECÇÃO DA REVISTA COM EFEITO DE QUINA REALISTA */}
                    <section className="bg-slate-50/50 py-12 sm:py-32 border-y border-slate-100 overflow-hidden px-4 sm:px-12 fade-in-up text-slate-900 text-left font-black text-left">
                        <div className="max-w-6xl mx-auto flex flex-col lg:flex-row items-center gap-12 lg:gap-28 text-left font-black text-slate-900 text-left">
                            <div className="w-full lg:w-2/5 flex flex-col items-center group text-left font-black text-left">
                                <div className="relative w-full max-w-[280px] sm:max-w-[360px] h-[380px] sm:h-[480px] text-left magazine-curl-container">
                                    {/* VOLUME 2024 */}
                                    <div className={`absolute inset-0 magazine-transition ${activeMagazineYear === 2024 ? 'opacity-100 scale-100 rotate-0 z-10' : 'opacity-0 scale-90 -rotate-12 pointer-events-none z-0'}`}>
                                        <div className="curl-wrapper h-full w-full">
                                            <img src={IMAGES.cover_2024} className="w-full h-full object-cover img-paper-shadow border-[8px] sm:border-[10px] border-white rounded-sm" />
                                        </div>
                                        <div className="absolute -bottom-4 -left-4 bg-indigo-600 text-white px-6 sm:px-8 py-2 sm:py-3 rounded-2xl shadow-2xl border-4 border-white/10 font-black italic text-sm sm:text-base z-[30]">2024</div>
                                    </div>
                                    {/* VOLUME 2025 */}
                                    <div className={`absolute inset-0 magazine-transition ${activeMagazineYear === 2025 ? 'opacity-100 scale-100 rotate-0 z-10' : 'opacity-0 scale-90 rotate-12 pointer-events-none z-0'}`}>
                                        <div className="curl-wrapper h-full w-full">
                                            <div className="w-full h-full bg-white border-[10px] border-white rounded-sm img-paper-shadow flex flex-col items-center justify-center p-8 text-slate-300">
                                                <Icon name="lock" size={64} className="mb-6 opacity-20 text-indigo-600" />
                                                <h4 className="academic-title text-4xl font-black opacity-30 mb-2 text-slate-900 font-black">2025</h4>
                                                <span className="text-[9px] font-black uppercase tracking-[0.4em] bg-slate-50 text-slate-400 px-6 py-2 rounded-full shadow-inner border border-slate-100">Em Breve</span>
                                            </div>
                                        </div>
                                        <div className="absolute -bottom-4 -left-4 bg-slate-400 text-white px-6 sm:px-8 py-2 sm:py-3 rounded-2xl shadow-2xl border-4 border-white/10 font-black italic text-sm sm:text-base opacity-50 z-[30]">2025</div>
                                    </div>
                                </div>
                                <div className="mt-10 flex flex-row items-center gap-4 bg-white p-2 rounded-full border border-slate-200 shadow-xl text-left font-black text-slate-400 text-left">
                                    <span className="text-[9px] font-black text-slate-400 uppercase tracking-widest px-4 border-r border-slate-200">Volume</span>
                                    <div className="flex gap-1.5 font-black text-slate-400 text-left">
                                        {[2024, 2025].map(year => (
                                            <button key={year} onClick={() => setActiveMagazineYear(year)} className={`w-10 h-10 rounded-full flex items-center justify-center transition-all font-black text-xs italic ${activeMagazineYear === year ? 'bg-[#151c32] text-white shadow-xl scale-110' : 'bg-transparent text-slate-400'}`}>{year.toString().slice(-2)}</button>
                                        ))}
                                    </div>
                                </div>
                            </div>
                            <div className="w-full lg:w-3/5 space-y-8 text-left text-slate-900 font-black text-left text-slate-900 text-left">
                                <div className="space-y-6 text-left text-slate-900 text-left">
                                    <div className="flex items-center gap-4 text-indigo-600 font-black text-left text-indigo-600 text-left"><Icon name="book-marked" size={32} /><h2 className="academic-title text-3xl sm:text-5xl font-black text-slate-900 uppercase">Edição {activeMagazineYear}</h2></div>
                                    <p className="text-slate-500 text-lg sm:text-xl leading-relaxed font-light italic max-w-xl text-left text-slate-500 text-left text-slate-500">
                                        {activeMagazineYear === 2024 
                                            ? "A edição de 2024 da Revista de Iniciação Científica Ser! reúne os principais projetos pelos alunos dos Itinerários Formativos, refletindo o compromisso com a pesquisa."
                                            : "Aguarde o lançamento da nossa nova edição em desenvolvimento com os projetos que estão sendo criados neste ano."}
                                    </p>
                                </div>
                                {activeMagazineYear === 2024 ? (
                                    <button onClick={openCatalog} className="w-full max-w-sm py-4 sm:py-5 bg-[#151c32] text-white font-black rounded-[1.5rem] text-[11px] sm:text-sm uppercase tracking-[0.3em] hover:bg-indigo-600 transition-all shadow-2xl flex items-center justify-center gap-4 active:scale-95 btn-shimmer">EXPLORAR REVISTA <Icon name="book-open" size={20} /></button>
                                ) : (
                                    <div className="inline-flex items-center gap-4 text-slate-400 font-black uppercase text-[10px] tracking-widest border-2 border-dashed border-slate-200 px-8 py-5 rounded-[1.5rem] bg-white/50 backdrop-blur-sm">Publicação em curso</div>
                                )}
                            </div>
                        </div>
                    </section>

                    {/* VÍDEO 2025 */}
                    <section className="py-16 sm:py-32 bg-white px-6 fade-in-up text-slate-900 text-left font-black text-left">
                        <div className="max-w-6xl mx-auto flex flex-col lg:flex-row items-center gap-12 sm:gap-20 text-left font-black text-left">
                            <div className="w-full lg:w-1/2 text-left space-y-6 font-black text-slate-900 text-left text-slate-900">
                                <div className="flex items-center gap-3 text-indigo-600 font-black text-indigo-600 text-left text-left text-indigo-600 text-left"><Icon name="play-circle" size={32} /><h2 className="academic-title text-3xl sm:text-5xl font-black text-[#151c32] uppercase text-left text-[#151c32] font-black">Confira como foi o evento de 2025</h2></div>
                                <p className="text-slate-500 text-lg sm:text-xl font-light leading-relaxed text-left text-slate-500 text-left">Reviva os melhores momentos da nossa última mostra científica, onde a inovação e o protagonismo estudantil ganharam vida.</p>
                                <button className="px-8 py-3.5 border-2 border-[#151c32] text-[#151c32] font-black rounded-xl text-xs uppercase tracking-widest hover:bg-[#151c32] hover:text-white transition-all font-black text-[#151c32]">Ver Galeria Completa</button>
                            </div>
                            <div className="w-full lg:w-1/2">
                                <div className="video-container shadow-2xl border-4 border-slate-100 bg-black">
                                    <iframe src={IMAGES.event_video_url} className="w-full h-full border-none" allow="autoplay; encrypted-media; fullscreen"></iframe>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* CARROSSEL */}
                    <section className="relative min-h-[550px] sm:min-h-[700px] flex items-center bg-[#151c32] overflow-hidden bg-hero-carousel shadow-inner mx-0 sm:mx-12 sm:rounded-[4rem] my-0 sm:my-32 text-left fade-in-up text-white text-left text-white" style={{ backgroundImage: `linear-gradient(to right, rgba(21, 28, 50, 0.98), rgba(21, 28, 50, 0.7)), url('${ARTICLES_DATA[activeSlide].bg}')` }}>
                        <div className="absolute bottom-0 left-0 w-full h-1.5 bg-white/10 z-40 overflow-hidden">
                            <div className="h-full bg-indigo-500 transition-all duration-100 ease-linear" style={{ width: `${progress}%` }}></div>
                        </div>
                        <div className="absolute inset-x-0 top-1/2 -translate-y-1/2 flex justify-between px-3 sm:px-14 z-30 pointer-events-none text-white font-black text-left">
                            <button onClick={prevSlide} className="w-10 h-10 sm:w-16 sm:h-16 flex items-center justify-center rounded-full bg-white/10 border border-white/20 text-white hover:bg-indigo-600 transition-all pointer-events-auto backdrop-blur-md active:scale-90 text-white font-black"><Icon name="chevron-left" size={20} /></button>
                            <button onClick={nextSlide} className="w-10 h-10 sm:w-16 sm:h-16 flex items-center justify-center rounded-full bg-white/10 border border-white/20 text-white hover:bg-indigo-600 transition-all pointer-events-auto backdrop-blur-md active:scale-90 text-white font-black"><Icon name="chevron-right" size={20} /></button>
                        </div>
                        <div className="relative max-w-6xl mx-auto px-6 sm:px-20 w-full z-10 text-left py-20 sm:py-0 text-white font-black text-left text-white text-left">
                            <div key={`slide-${activeSlide}`} className="slide-content-enter text-white text-left font-black text-white text-left text-white">
                                <div className="inline-flex items-center gap-2 px-4 py-2 bg-indigo-500/20 rounded-full border border-indigo-500/30 mb-6 text-white font-black text-white font-black text-white text-indigo-300"><Icon name="award" size={14} className="text-indigo-300" /><span className="text-[10px] font-black uppercase tracking-widest text-indigo-200">Destaque Científico</span></div>
                                <h2 className="modern-title text-3xl sm:text-5xl md:text-7xl font-black leading-[1.1] uppercase max-w-4xl mb-8 text-white tracking-tighter text-balance text-left text-white font-black text-left">{ARTICLES_DATA[activeSlide].title}</h2>
                                <div className="flex flex-wrap gap-4 sm:gap-8 text-[10px] uppercase font-black tracking-[0.2em] text-indigo-300/80 mb-10 text-left text-white font-black text-left"><span className="flex items-center gap-2 text-white border-b border-indigo-500/30 pb-1 font-black text-white font-black text-white font-black text-left"><Icon name="book" size={14} className="text-white" /> {ARTICLES_DATA[activeSlide].area}</span><span className="flex items-center gap-2 text-white border-b border-indigo-500/30 pb-1 font-black text-white font-black text-white text-white font-black text-left"><Icon name="user-check" size={14} className="text-white" /> Prof. {ARTICLES_DATA[activeSlide].prof}</span></div>
                                <div className="flex flex-col sm:flex-row gap-5 text-left text-white font-black text-left text-left">
                                    <button onClick={() => navigateTo('reader', ARTICLES_DATA[activeSlide])} className="w-full sm:w-auto px-12 py-5 sm:py-6 bg-indigo-600 text-white font-black rounded-2xl hover:bg-indigo-500 transition-all shadow-2xl text-[11px] sm:text-xs uppercase tracking-[0.3em] active:scale-95 flex items-center justify-center btn-shimmer">
                                        LER ARTIGO <Icon name="file-text" size={20} className="ml-2" />
                                    </button>
                                    <button onClick={() => navigateTo('banner', ARTICLES_DATA[activeSlide])} className="w-full sm:w-auto px-12 py-5 sm:py-6 bg-white/5 border border-white/20 text-white font-black rounded-2xl hover:bg-white/10 transition-all text-[11px] sm:text-xs uppercase tracking-[0.3em] backdrop-blur-md active:scale-95 flex items-center justify-center text-white">
                                        VER BANNER <Icon name="image" size={20} className="ml-2" />
                                    </button>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* JORNADA 2026 */}
                    <section className="bg-slate-900 py-20 sm:py-32 px-4 sm:px-12 text-left text-white relative overflow-hidden fade-in-up text-left font-black text-white text-left">
                        <div className="absolute bottom-0 right-0 w-full h-full bg-gradient-to-t from-indigo-600/5 to-transparent text-left text-white text-left"></div>
                        <div className="max-w-6xl mx-auto flex flex-col md:grid md:grid-cols-2 gap-16 items-center relative z-10 text-left text-white font-black text-left text-white text-left">
                            <div className="space-y-8 text-left text-white font-black text-left text-white text-left">
                                <div className="flex items-center gap-4 text-indigo-400 font-black text-left text-indigo-400 leading-none text-left text-left"><Icon name="calendar-days" size={32} className="text-indigo-400" /><h2 className="academic-title text-3xl sm:text-6xl font-black tracking-tight uppercase text-white font-black leading-none text-white font-black text-left text-white">Jornada 2026</h2></div>
                                <p className="text-slate-400 text-lg sm:text-2xl font-light leading-relaxed text-balance text-left text-slate-400 text-left text-slate-400">O amanhã da ciência já está sendo construído com novos compromissos e descobertas nos Itinerários Formativos.</p>
                            </div>
                            <div className="relative flex justify-center lg:justify-end text-center group text-[#151c32] font-black text-center text-[#151c32] text-center">
                                <div className="bg-white p-6 sm:p-10 rounded-[3rem] sm:rounded-[4rem] shadow-2xl flex flex-col items-center justify-center w-[280px] h-[280px] sm:w-[320px] sm:h-[350px] border border-white/10 transition-all duration-700 hover:scale-105 text-[#151c32] overflow-hidden text-center text-[#151c32] text-center">
                                    <span className="text-[10px] sm:text-[12px] font-black uppercase tracking-[0.4em] text-slate-400 block mb-4 text-center leading-tight text-center text-slate-400">Próximo Volume em</span>
                                    <h3 className="academic-title text-6xl sm:text-7xl md:text-8xl font-black text-[#151c32] uppercase tracking-tighter text-center leading-none text-[#151c32] text-center">2026</h3>
                                    <div className="h-2 w-16 bg-indigo-600 mx-auto mt-8 rounded-full opacity-30 bg-indigo-600 text-center bg-indigo-600"></div>
                                </div>
                            </div>
                        </div>
                    </section>

                    <div className="max-w-5xl mx-auto px-6 py-20 sm:py-32 text-center border-t border-slate-50 text-center text-slate-800 font-black text-center text-slate-800">
                        <Icon name="heart" size={40} className="text-indigo-600 mb-8 mx-auto opacity-70 animate-pulse text-indigo-600 font-black text-center text-indigo-600" />
                        <h3 className="academic-title text-xl sm:text-4xl font-bold italic text-slate-800 tracking-tight text-balance leading-snug text-slate-800 font-black text-center text-slate-800">"O melhor caminho é o que fazemos juntos"</h3>
                        <div className="mt-12 text-[10px] sm:text-[11px] font-black uppercase tracking-[0.4em] text-slate-300 font-black text-center text-slate-300">Colégio Ser! Sorocaba • Alfabetização Científica</div>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen bg-white h-full w-full">
                    {view === 'home' && renderHome()}
                    {view === 'catalog' && renderCatalog()}
                    {view === 'reader' && renderReader()}
                    {view === 'banner' && renderBanner()}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

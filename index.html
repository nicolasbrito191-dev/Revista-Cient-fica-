<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Revista de Iniciação Científica Ser!</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #4f46e5; /* Indigo */
            --secondary: #8b5cf6; /* Violet */
            --dark: #0f172a;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #fafafa; 
            margin: 0;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }
        
        .academic-title { font-family: 'Playfair Display', serif; }
        
        .text-gradient {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .bg-grid-pattern {
            background-image: radial-gradient(rgba(79, 70, 229, 0.15) 1px, transparent 1px);
            background-size: 24px 24px;
        }

        .bg-hero-carousel {
            background-size: cover;
            background-position: center;
            transition: all 1.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Animações de Entrada */
        .fade-in-up { animation: fadeInUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; opacity: 0; transform: translateY(20px); }
        @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }

        .slide-content-enter { animation: slideIn 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(40px); } to { opacity: 1; transform: translateX(0); } }

        /* Animação Flutuante para a Revista */
        .animate-float {
            animation: float 6s ease-in-out infinite;
        }
        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(1deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        /* Cartões Tecnológicos - Atualizado para destaque nas bordas (Glow Effect) */
        .tech-card {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .tech-card:hover {
            transform: translateY(-8px) scale(1.01);
            border-color: var(--secondary);
            box-shadow: 0 20px 40px -10px rgba(79, 70, 229, 0.2), 0 0 25px rgba(139, 92, 246, 0.35);
        }

        /* Capa da Revista e Quina Dobrada Realista */
        .img-paper-shadow {
            box-shadow: 20px 20px 60px rgba(0,0,0,0.15), -1px -1px 2px rgba(255,255,255,0.8);
            transition: all 0.6s ease;
        }

        .magazine-curl-container { position: relative; cursor: pointer; perspective: 1000px; }
        .curl-wrapper {
            position: relative; width: 100%; height: 100%;
            overflow: hidden; border-radius: 0.125rem;
            transition: transform 0.5s ease;
        }
        .magazine-curl-container:hover .curl-wrapper { transform: rotateY(-5deg) rotateX(2deg); }

        .curl-wrapper::after {
            content: ""; position: absolute; bottom: 0; right: 0; width: 0; height: 0;
            background: linear-gradient(135deg, transparent 48%, rgba(200, 200, 200, 0.2) 50%, #ffffff 52%, #f1f5f9 100%);
            box-shadow: -5px -5px 15px rgba(0, 0, 0, 0.3);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); pointer-events: none; z-index: 20;
        }
        .magazine-curl-container:hover .curl-wrapper::after { width: 90px; height: 90px; }

        /* Elementos Glassmorphism */
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        .glass-panel-dark {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Botões Shimmer High-Tech */
        .btn-tech {
            position: relative; overflow: hidden; z-index: 1;
            transition: all 0.3s ease;
        }
        .btn-tech::before {
            content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.7s ease; z-index: -1;
        }
        .btn-tech:hover::before { left: 100%; }
        .btn-tech:hover { box-shadow: 0 0 20px rgba(79, 70, 229, 0.6); transform: translateY(-2px); }

        .pdf-viewer-container {
            width: 100%; max-width: 1100px; height: 85vh; min-height: 500px;
            border-radius: 24px; overflow: hidden; position: relative;
        }
        
        .video-container {
            position: relative; padding-bottom: 56.25%; height: 0;
            overflow: hidden; border-radius: 24px; background: #000;
        }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        /* Barra Rápida */
        .floating-nav {
            position: sticky; top: 20px; z-index: 100;
            transition: all 0.3s ease;
        }
        .quick-nav-link { position: relative; transition: color 0.3s ease; }
        .quick-nav-link::after {
            content: ''; position: absolute; bottom: -6px; left: 50%; transform: translateX(-50%);
            width: 0; height: 3px; background: var(--secondary); border-radius: 10px; transition: width 0.3s ease;
        }
        .quick-nav-link:hover::after { width: 100%; box-shadow: 0 0 10px var(--secondary); }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }
    </style>
</head>
<body class="text-slate-800 selection:bg-violet-200 selection:text-violet-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback } = React;

        const IMAGES = {
            top_banner: "https://lh3.googleusercontent.com/u/0/d/1-J2lO3tufWEXNdFDbvbUaHBNqABjOPqe=w1600",
            overlay_logo: "https://lh3.googleusercontent.com/u/0/d/15x27AzxW9GANulDbLrYlqzRC6obRAXMI=w1600",
            cover_v1: "https://lh7-rt.googleusercontent.com/sitesz/AClOY7pz2nRa1cCyR4ZTGfEK8WJ39oLERNS7PJEA42mtm9rYDl8ms-6_shb9Zm2SgI2CRO_SjBY9MIuyB5gcbV0ut-zOo_-gzE2jZrjGL5GDvnLs738q3ajmJHTYoK-62PM_CC7xKkoMJmE35WdMMOLbRQ-GXp9a0fBtsYgKWkf1Wdr-QPnHAlk?key=aCpffzizo07AapIHHMuf7A",
            event_video_url: "https://drive.google.com/file/d/1ofr-zpluxaNtkGjM82pDGy-sFgMAXWYZ/preview"
        };

        const ARTICLES_DATA = [
            { id: "propaganda", title: "Como a propaganda influencia os jovens contemporâneos", area: "Sistema Mundo", prof: "Naia Godoy Padovanni", authors: "Laura Almeida Duarte, Manuella Guimaro, Maria Eduarda Medeiros", bg: "https://lh3.googleusercontent.com/u/0/d/1MRcxEyyQbnOjy7TFA_RIzls0RkLWBApl=w1600", pdf: "https://drive.google.com/file/d/1X92V3yBTVRB_jnBhNRvzfvM4i1rIRzWe/preview", banner: "https://drive.google.com/file/d/1MRcxEyyQbnOjy7TFA_RIzls0RkLWBApl/view" },
            { id: "tecnologia", title: "Tecnologia e a organização empresarial", area: "Análise de Dados", prof: "Adriano Ortiz Souza", authors: "Ana Cristina Borges Martinis, Isadora Almeida Viveiros, Júlia de Souza", bg: "https://lh3.googleusercontent.com/u/0/d/1FNNBHpe5mIkRyhrNKjnRylqZQQTIcqj-=w1600", pdf: "https://drive.google.com/file/d/1JFnvQbYIA_lEDLD1AXMG_zDxt5xNoSsV/preview", banner: "https://drive.google.com/file/d/1FNNBHpe5mIkRyhrNKjnRylqZQQTIcqj-/view" },
            { id: "regicide", title: "Desenvolvimento do Jogo Regicide", area: "Análise de Dados", prof: "Adriano Ortiz Souza", authors: "Gabriel Garcia Flores", bg: "https://lh3.googleusercontent.com/u/0/d/1C0SuSb4ra1sQGwTQg5-SQIoZ3Vf9U6fF=w1600", pdf: "https://drive.google.com/file/d/1RZwnf4e0SEQvaH3b8pJpgRTEDTs8wv9R/preview", banner: "https://drive.google.com/file/d/1C0SuSb4ra1sQGwTQg5-SQIoZ3Vf9U6fF/view" },
            { id: "foguete", title: "Eco-Foguete: Dispersão de sementes", area: "Meio Ambiente", prof: "Gabriel Costa Soares", authors: "Isabela Mir de Campos Corrêa, Victor Cano Ronzani Pereira, Maria Eduarda Ramos Tagliaferro", bg: "https://lh3.googleusercontent.com/u/0/d/1Gz8kxtvNWUle02Hw2X3YmPFhG3zuyhPR=w1600", pdf: "https://drive.google.com/file/d/1WsYPze9P6WRoRWDL18A07xvElUgLXJ_h/preview", banner: "https://drive.google.com/file/d/1Gz8kxtvNWUle02Hw2X3YmPFhG3zuyhPR/view" },
            { id: "valvula", title: "Válvula de Controle Remoto", area: "Maker", prof: "Jose Eduardo Xavier", authors: "Nicolas Dias da Silva Carravero, João Vitor Israel de Oliveira Annibaldi, Lorenzo Pederiva Leite", bg: "https://lh3.googleusercontent.com/u/0/d/1teyhwUnb2x50RDN4P6e7K6Q_3fHBodgv=w1600", pdf: "https://drive.google.com/file/d/1n_TwNW_4W2Ie85CZ-m-wlWy-tfZsdGBM/preview", banner: "https://drive.google.com/file/d/1teyhwUnb2x50RDN4P6e7K6Q_3fHBodgv/view" },
            { id: "vento-ionico", title: "Geração de vento iônico", area: "Maker", prof: "Daniel Alisson Cardoso", authors: "Brenda Martines Tavares, Maria Eduarda de Santana Souza", bg: "https://lh3.googleusercontent.com/u/0/d/1fYyrVo2oTrNtXGpDgS8DY31mzMFOMWC8=w1600", pdf: "https://drive.google.com/file/d/1qUog4169272MvcUIaNxJEpPGDhA6IVpo/preview", banner: "https://drive.google.com/file/d/1fYyrVo2oTrNtXGpDgS8DY31mzMFOMWC8/view" },
            { id: "extremismo", title: "Disseminação de ideias extremistas", area: "Sistema Mundo", prof: "Naia Godoy Padovanni", authors: "Luísa Murata, João Botto, Ana Sofia Gretzitz, Eduardo Domingues, Lívia Todesco, Lavínia Welter", bg: "https://lh3.googleusercontent.com/u/0/d/1COBgBrgXH2XU4xzEgq15_WJ1lJmFceUp=w1600", pdf: "https://drive.google.com/file/d/1UMUjADuxJOip39tZjzvuoxgY16vdWMGS/preview", banner: "https://drive.google.com/file/d/1COBgBrgXH2XU4xzEgq15_WJ1lJmFceUp/view" }
        ];

        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => { if (window.lucide) lucide.createIcons(); }, [name]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        const App = () => {
            const [view, setView] = useState('home'); 
            const [selectedArticle, setSelectedArticle] = useState(null);
            const [activeSlide, setActiveSlide] = useState(0);
            const [activeMagazineVol, setActiveMagazineVol] = useState(1);
            const [searchQuery, setSearchQuery] = useState('');
            const [progress, setProgress] = useState(0);

            const goHome = useCallback(() => { setView('home'); setSelectedArticle(null); setSearchQuery(''); window.scrollTo(0, 0); }, []);
            const openCatalog = useCallback(() => { setView('catalog'); setSelectedArticle(null); window.scrollTo(0, 0); }, []);
            const navigateTo = useCallback((page, article = null) => { setSelectedArticle(article); setView(page); window.scrollTo(0, 0); }, []);

            const nextSlide = useCallback(() => { setActiveSlide(p => (p + 1) % ARTICLES_DATA.length); setProgress(0); }, []);
            const prevSlide = useCallback(() => { setActiveSlide(p => (p - 1 + ARTICLES_DATA.length) % ARTICLES_DATA.length); setProgress(0); }, []);

            const scrollToSection = (id) => {
                const element = document.getElementById(id);
                if (element) {
                    const offset = 100; // Maior offset devido ao menu flutuante
                    const bodyRect = document.body.getBoundingClientRect().top;
                    const elementRect = element.getBoundingClientRect().top;
                    window.scrollTo({ top: (elementRect - bodyRect) - offset, behavior: 'smooth' });
                }
            };

            useEffect(() => {
                if (view !== 'home') return;
                const timer = setInterval(() => {
                    setProgress(p => {
                        if (p >= 100) { nextSlide(); return 0; }
                        return p + 0.5;
                    });
                }, 30);
                return () => clearInterval(timer);
            }, [view, nextSlide]);

            const filteredArticles = useMemo(() => {
                const query = searchQuery.toLowerCase().trim();
                if (!query) return ARTICLES_DATA;
                return ARTICLES_DATA.filter(art => 
                    art.title.toLowerCase().includes(query) || art.authors.toLowerCase().includes(query) || art.prof.toLowerCase().includes(query) || art.area.toLowerCase().includes(query)
                );
            }, [searchQuery]);

            // --- VISTAS ---

            const renderCatalog = () => (
                <div className="w-full min-h-screen bg-[#f8fafc] page-transition">
                    {/* Header Biblioteca Sci-Fi */}
                    <div className="bg-[#0f172a] text-white py-16 px-6 sm:px-12 relative overflow-hidden">
                        <div className="absolute top-0 right-0 w-full h-full bg-grid-pattern opacity-20"></div>
                        <div className="absolute -top-40 -right-40 w-96 h-96 bg-violet-600/20 rounded-full blur-[100px]"></div>
                        <div className="absolute top-40 -left-20 w-72 h-72 bg-indigo-600/20 rounded-full blur-[80px]"></div>
                        
                        <div className="max-w-6xl mx-auto flex flex-col md:flex-row md:items-end justify-between gap-8 relative z-10">
                            <div className="slide-content-enter">
                                <button onClick={goHome} className="flex items-center gap-2 text-violet-400 font-bold uppercase text-[11px] tracking-widest mb-6 hover:text-violet-300 transition-all">
                                    <Icon name="arrow-left" size={16} /> Voltar ao Início
                                </button>
                                <h1 className="academic-title text-4xl sm:text-6xl font-black mb-2 leading-none text-white">Biblioteca <span className="text-gradient">Ser!</span></h1>
                                <p className="text-slate-400 text-sm sm:text-lg font-light mt-4 max-w-xl">Acervo digital tecnológico das produções intelectuais desenvolvidas pelos nossos alunos.</p>
                            </div>
                            <div className="glass-panel-dark px-6 py-5 rounded-3xl flex items-center gap-4 w-full md:max-w-md shadow-[0_0_30px_rgba(139,92,246,0.1)] focus-within:shadow-[0_0_40px_rgba(79,70,229,0.3)] transition-all">
                                <Icon name="search" size={22} className="text-violet-400" />
                                <input type="text" value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} placeholder="Pesquisar projetos, autores..." className="bg-transparent border-none text-white text-base focus:outline-none w-full placeholder-slate-500 font-medium" />
                                {searchQuery && <button onClick={() => setSearchQuery('')} className="text-slate-400 hover:text-white transition-all"><Icon name="x" size={20}/></button>}
                            </div>
                        </div>
                    </div>

                    <div className="max-w-7xl mx-auto px-6 sm:px-12 py-16 sm:py-24 bg-grid-pattern relative">
                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8 sm:gap-12">
                            {filteredArticles.map((art, index) => (
                                /* CARTÃO COM EFEITO GLOW NAS BORDAS AO PASSAR O RATO */
                                <div key={art.id} className="tech-card group bg-white rounded-[2rem] overflow-hidden shadow-lg border-2 border-slate-100 fade-in-up flex flex-col" style={{ animationDelay: `${index * 0.05}s` }}>
                                    <div className="h-48 sm:h-56 overflow-hidden relative">
                                        <img src={art.bg} className="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" alt={art.title} />
                                        <div className="absolute inset-0 bg-gradient-to-t from-slate-900 via-slate-900/20 to-transparent flex items-end p-6">
                                            <span className="text-[10px] font-black bg-violet-500 text-white px-4 py-1.5 rounded-full uppercase tracking-widest shadow-[0_0_15px_rgba(139,92,246,0.5)]">{art.area}</span>
                                        </div>
                                    </div>
                                    <div className="p-8 flex flex-col flex-grow">
                                        <h3 className="academic-title text-xl font-bold text-slate-800 mb-4 leading-tight min-h-[3.5rem] line-clamp-2 italic group-hover:text-indigo-700 transition-colors">{art.title}</h3>
                                        <p className="text-xs text-slate-500 font-medium italic mb-6 line-clamp-2 border-l-2 border-violet-400 pl-3">{art.authors}</p>
                                        <div className="flex items-center gap-2 text-slate-400 text-[11px] font-bold uppercase mb-8 mt-auto pt-4 border-t border-slate-100">
                                            <Icon name="user" size={14} className="text-indigo-500" /> Prof. {art.prof}
                                        </div>
                                        <div className="grid grid-cols-2 gap-4 mt-auto">
                                            <button onClick={() => navigateTo('reader', art)} className="btn-tech bg-[#0f172a] text-white py-4 rounded-2xl font-black text-[10px] uppercase shadow-lg flex items-center justify-center">Ler Artigo</button>
                                            <button onClick={() => navigateTo('banner', art)} className="bg-slate-100 text-slate-700 hover:bg-slate-200 py-4 rounded-2xl font-black text-[10px] uppercase transition-all flex items-center justify-center">Ver Banner</button>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );

            const renderReader = () => (
                <div className="w-full min-h-screen bg-[#0f172a] page-transition flex flex-col items-center">
                    <div className="w-full glass-panel-dark px-6 py-4 flex items-center justify-between sticky top-0 z-[100] border-b border-white/10 shadow-[0_10px_30px_rgba(0,0,0,0.5)]">
                        <div className="flex items-center gap-4 flex-1 overflow-hidden">
                            <button onClick={() => setView('catalog')} className="p-2 hover:bg-white/10 rounded-full text-violet-400 transition flex items-center justify-center shrink-0"><Icon name="arrow-left" size={24} /></button>
                            <div className="text-white truncate max-w-full">
                                <h2 className="academic-title text-base sm:text-xl font-bold truncate">{selectedArticle.title}</h2>
                                <div className="flex items-center gap-2 mt-1">
                                    <span className="w-2 h-2 rounded-full bg-violet-400 animate-pulse"></span>
                                    <p className="text-[10px] text-violet-400 font-bold uppercase tracking-widest">Edição 2024</p>
                                </div>
                            </div>
                        </div>
                        <div className="flex items-center gap-3">
                            <a href={selectedArticle.pdf.replace('/preview', '/view')} target="_blank" rel="noopener noreferrer" className="btn-tech bg-indigo-600 text-white px-5 py-3 rounded-xl font-black text-[10px] sm:text-xs uppercase shadow-[0_0_20px_rgba(79,70,229,0.4)] flex items-center gap-2">
                                <Icon name="maximize" size={16} /> <span className="hidden sm:inline">Tela Cheia</span>
                            </a>
                        </div>
                    </div>
                    <div className="flex-grow w-full p-4 sm:p-12 flex flex-col items-center bg-grid-pattern relative">
                        <div className="absolute inset-0 bg-gradient-to-b from-[#0f172a] via-transparent to-[#0f172a] pointer-events-none"></div>
                        <div className="pdf-viewer-container fade-in-up shadow-[0_0_50px_rgba(139,92,246,0.15)] ring-1 ring-white/10 z-10">
                            <iframe key={`pdf-${selectedArticle.id}`} src={`${selectedArticle.pdf}?authuser=0`} className="w-full h-full border-none bg-white rounded-[23px]" allow="autoplay"></iframe>
                        </div>
                    </div>
                </div>
            );

            const renderBanner = () => (
                <div className="w-full min-h-screen bg-[#0f172a] page-transition flex flex-col items-center">
                    <div className="w-full glass-panel-dark px-6 py-4 flex items-center justify-between sticky top-0 z-[100] border-b border-white/10">
                        <button onClick={() => setView('catalog')} className="text-violet-400 hover:text-violet-300 flex items-center gap-2 text-xs font-bold uppercase tracking-widest transition"><Icon name="arrow-left" size={18} /> Acervo</button>
                        <h2 className="academic-title text-white text-sm sm:text-xl font-bold uppercase tracking-widest text-center">Visualizador de Projeto</h2>
                        <a href={selectedArticle.banner} target="_blank" rel="noopener noreferrer" className="btn-tech bg-violet-500 text-white px-5 py-3 rounded-xl shadow-[0_0_20px_rgba(139,92,246,0.4)] flex items-center gap-2 font-black text-[10px] sm:text-xs uppercase">
                            <Icon name="external-link" size={16} /> <span className="hidden sm:inline">Expandir</span>
                        </a>
                    </div>
                    <div className="flex-grow w-full max-w-7xl mx-auto flex flex-col lg:grid lg:grid-cols-12 gap-10 p-6 sm:p-12 items-center relative">
                        <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-3/4 h-3/4 bg-indigo-600/10 blur-[120px] rounded-full pointer-events-none"></div>
                        
                        <div className="w-full lg:col-span-8 flex justify-center fade-in-up z-10">
                            <div className="relative glass-panel-dark rounded-[2rem] p-2 shadow-2xl overflow-hidden ring-1 ring-white/10 group">
                                <img src={selectedArticle.bg} className="w-full h-auto rounded-[1.5rem] max-h-[60vh] lg:max-h-[75vh] object-contain transition-transform duration-700 group-hover:scale-[1.02]" alt="Banner" />
                            </div>
                        </div>
                        <div className="w-full lg:col-span-4 glass-panel-dark p-8 sm:p-10 rounded-[2.5rem] slide-content-enter z-10 relative overflow-hidden">
                            <div className="absolute top-0 right-0 w-32 h-32 bg-violet-500/10 blur-[40px]"></div>
                            
                            <h3 className="academic-title text-2xl sm:text-3xl font-bold mb-6 uppercase italic text-white leading-tight">{selectedArticle.title}</h3>
                            <div className="space-y-6">
                                <div className="bg-white/5 p-5 rounded-2xl border border-white/10 backdrop-blur-sm">
                                    <div className="flex items-center gap-2 text-violet-400 text-[10px] uppercase font-black tracking-widest mb-3"><Icon name="users" size={14} /> Autores do Projeto</div>
                                    <p className="text-sm font-medium italic text-slate-300 leading-relaxed">{selectedArticle.authors}</p>
                                </div>
                                <div className="grid grid-cols-2 gap-4">
                                    <div className="bg-white/5 p-4 rounded-2xl border border-white/10"><div className="text-slate-400 text-[9px] uppercase font-bold tracking-widest mb-2">Área / Itinerário</div><div className="text-violet-300 font-black uppercase text-xs">{selectedArticle.area}</div></div>
                                    <div className="bg-white/5 p-4 rounded-2xl border border-white/10"><div className="text-slate-400 text-[9px] uppercase font-bold tracking-widest mb-2">Orientação</div><div className="text-white font-black uppercase text-xs">{selectedArticle.prof}</div></div>
                                </div>
                            </div>
                            <div className="mt-10">
                                <button onClick={() => navigateTo('reader', selectedArticle)} className="w-full btn-tech bg-indigo-600 text-white font-black py-5 rounded-2xl uppercase text-xs flex items-center justify-center gap-3">
                                    Ler Pesquisa Completa <Icon name="arrow-right" size={18} />
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );

            // --- VISTA INICIAL ---
            const renderHome = () => (
                <div className="w-full bg-[#f8fafc] page-transition relative">
                    {/* Background global suave */}
                    <div className="absolute inset-0 bg-grid-pattern opacity-30 pointer-events-none z-0"></div>

                    {/* BARRA DE NAVEGAÇÃO FLUTUANTE (PILL NAV) */}
                    <div className="floating-nav hidden sm:flex justify-center w-full pt-6 pointer-events-none">
                        <div className="glass-panel px-8 py-4 rounded-full shadow-[0_10px_40px_-10px_rgba(0,0,0,0.1)] flex items-center gap-8 pointer-events-auto">
                            {[
                                { id: 'apresentacao', label: 'Apresentação' },
                                { id: 'edicoes', label: 'Revistas' },
                                { id: 'evento', label: 'Evento 2025' },
                                { id: 'destaques', label: 'Destaques' },
                                { id: 'jornada', label: 'Jornada 2026' }
                            ].map((item) => (
                                <button 
                                    key={item.id} 
                                    onClick={() => scrollToSection(item.id)}
                                    className="quick-nav-link text-xs font-bold uppercase tracking-[0.15em] text-slate-500 hover:text-indigo-600 transition-colors"
                                >
                                    {item.label}
                                </button>
                            ))}
                        </div>
                    </div>

                    {/* 1. BANNER PRINCIPAL */}
                    <div className="w-full fade-in-up relative z-10 rounded-b-[3rem] overflow-hidden shadow-2xl">
                        <img src={IMAGES.top_banner} alt="Banner Revista Científica" className="w-full h-auto object-cover" />
                        <div className="absolute inset-0 bg-gradient-to-b from-black/40 via-transparent to-transparent pointer-events-none"></div>
                        <div className="absolute top-4 sm:top-10 left-4 sm:left-12 pointer-events-none">
                            <img src={IMAGES.overlay_logo} alt="Logo Colégio Ser!" className="h-12 sm:h-24 w-auto object-contain drop-shadow-2xl" />
                        </div>
                    </div>

                    {/* 2. SECÇÃO DE BOAS-VINDAS */}
                    <section id="apresentacao" className="py-20 sm:py-32 px-6 relative z-10 text-center">
                        <div className="fade-in-up">
                            <div className="inline-flex items-center gap-4 mb-8 px-6 py-2 rounded-full bg-indigo-50 border border-indigo-100 text-indigo-600 shadow-sm">
                                <Icon name="sparkles" size={16} className="text-indigo-500" />
                                <span className="text-[10px] sm:text-xs font-black uppercase tracking-[0.3em]">Portal de Ciências</span>
                            </div>
                            <h2 className="academic-title text-4xl sm:text-7xl font-black text-slate-900 mb-8 leading-[1.1] uppercase">
                                Revista de <br/><span className="text-gradient italic">Iniciação Científica Ser!</span>
                            </h2>
                            <p className="text-slate-500 text-lg sm:text-2xl font-light max-w-3xl mx-auto text-balance leading-relaxed">
                                Explorando o futuro através da excelência acadêmica e do rigor metodológico nos nossos Itinerários Formativos.
                            </p>
                        </div>
                    </section>

                    {/* 3. SECÇÃO DA REVISTA COM EFEITO REALISTA */}
                    <section id="edicoes" className="py-20 sm:py-32 px-6 relative z-10">
                        <div className="max-w-6xl mx-auto flex flex-col lg:flex-row items-center gap-16 lg:gap-24">
                            <div className="w-full lg:w-5/12 flex flex-col items-center relative">
                                {/* Brilho atrás da revista */}
                                <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-64 h-64 bg-indigo-400/20 blur-[60px] rounded-full z-0"></div>
                                
                                <div className="relative w-full max-w-[300px] sm:max-w-[380px] aspect-[1/1.4] magazine-curl-container animate-float z-10">
                                    {/* VOLUME 1 */}
                                    <div className={`absolute inset-0 magazine-transition ${activeMagazineVol === 1 ? 'opacity-100 scale-100 rotate-0 z-10' : 'opacity-0 scale-90 -rotate-6 pointer-events-none z-0'}`}>
                                        <div className="curl-wrapper">
                                            <img src={IMAGES.cover_v1} className="w-full h-full object-cover img-paper-shadow" alt="Capa Edição 2024" />
                                        </div>
                                        <div className="absolute -bottom-5 -left-5 bg-indigo-600 text-white px-8 py-3 rounded-2xl shadow-xl border border-indigo-400/30 font-black italic text-sm tracking-wide z-30">Edição 2024</div>
                                    </div>
                                    {/* VOLUME 2 */}
                                    <div className={`absolute inset-0 magazine-transition ${activeMagazineVol === 2 ? 'opacity-100 scale-100 rotate-0 z-10' : 'opacity-0 scale-90 rotate-6 pointer-events-none z-0'}`}>
                                        <div className="curl-wrapper">
                                            <div className="w-full h-full glass-panel flex flex-col items-center justify-center p-8 text-slate-400 img-paper-shadow border border-white">
                                                <Icon name="microscope" size={72} className="mb-6 opacity-30 text-indigo-500" />
                                                <h4 className="academic-title text-5xl font-black opacity-40 mb-4 text-slate-800">Vol 2</h4>
                                                <span className="text-[10px] font-black uppercase tracking-[0.4em] bg-white text-slate-500 px-6 py-2 rounded-full shadow-sm border border-slate-200">Em Desenvolvimento</span>
                                            </div>
                                        </div>
                                        <div className="absolute -bottom-5 -left-5 bg-slate-800 text-white px-8 py-3 rounded-2xl shadow-xl border border-slate-600 font-black italic text-sm tracking-wide z-30">Volume 2</div>
                                    </div>
                                </div>
                                
                                {/* Seletor Sci-Fi */}
                                <div className="mt-12 glass-panel p-2 rounded-full flex items-center shadow-lg z-10">
                                    <span className="text-[10px] font-black text-slate-400 uppercase tracking-widest px-6 border-r border-slate-200">Edição</span>
                                    <div className="flex gap-2 ml-2">
                                        {[1, 2].map(vol => (
                                            <button 
                                                key={vol} 
                                                onClick={() => setActiveMagazineVol(vol)} 
                                                className={`w-12 h-12 rounded-full flex items-center justify-center transition-all duration-300 font-black text-sm italic ${activeMagazineVol === vol ? 'bg-indigo-600 text-white shadow-[0_0_15px_rgba(79,70,229,0.5)] scale-110' : 'bg-transparent text-slate-400 hover:bg-slate-100'}`}
                                            >
                                                {vol}
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            </div>
                            
                            <div className="w-full lg:w-7/12 space-y-10 text-center lg:text-left z-10">
                                <div className="space-y-6">
                                    <div className="flex items-center justify-center lg:justify-start gap-4">
                                        <div className="w-12 h-12 rounded-2xl bg-indigo-100 text-indigo-600 flex items-center justify-center shadow-inner">
                                            <Icon name="book-open" size={24} />
                                        </div>
                                        <h2 className="academic-title text-4xl sm:text-6xl font-black text-slate-900 uppercase">Volume {activeMagazineVol}</h2>
                                    </div>
                                    <p className="text-slate-600 text-xl sm:text-2xl leading-relaxed font-light text-balance">
                                        {activeMagazineVol === 1 
                                            ? "A edição de 2024 da Revista de Iniciação Científica Ser! reúne os principais projetos pelos alunos dos Itinerários Formativos, refletindo o nosso compromisso inabalável com a pesquisa."
                                            : "Aguarde o lançamento do nosso próximo volume, atualmente em desenvolvimento com os novos projetos científicos deste ano letivo."}
                                    </p>
                                </div>
                                {activeMagazineVol === 1 ? (
                                    <button onClick={openCatalog} className="btn-tech w-full lg:w-auto px-10 py-5 bg-[#0f172a] text-white font-black rounded-2xl text-xs sm:text-sm uppercase tracking-[0.3em] flex items-center justify-center gap-4">
                                        Explorar Acervo <Icon name="arrow-right" size={20} className="text-violet-400" />
                                    </button>
                                ) : (
                                    <div className="inline-flex items-center gap-4 text-slate-400 font-black uppercase text-xs tracking-widest px-8 py-5 rounded-2xl border-2 border-dashed border-slate-300 bg-slate-50">Pesquisa em Andamento</div>
                                )}
                            </div>
                        </div>
                    </section>

                    {/* 4. SECÇÃO DE VÍDEO EXPANDIDA (Fundo Escuro) */}
                    <section id="evento" className="py-24 sm:py-32 bg-[#0f172a] px-6 relative overflow-hidden">
                        <div className="absolute top-0 w-full h-px bg-gradient-to-r from-transparent via-violet-500 to-transparent opacity-50"></div>
                        <div className="absolute bottom-0 w-full h-px bg-gradient-to-r from-transparent via-indigo-500 to-transparent opacity-50"></div>
                        
                        <div className="max-w-6xl mx-auto space-y-12 relative z-10">
                            <div className="text-center space-y-6">
                                <div className="inline-flex items-center gap-3 px-5 py-2 rounded-full bg-violet-900/30 border border-violet-500/30 text-violet-400 mb-4">
                                    <Icon name="play" size={14} />
                                    <span className="text-[10px] font-black uppercase tracking-[0.3em]">Registro Audiovisual</span>
                                </div>
                                <h2 className="academic-title text-4xl sm:text-6xl font-black text-white uppercase">Evento Científico <span className="text-violet-400">2025</span></h2>
                                <p className="text-slate-400 text-lg sm:text-xl font-light max-w-3xl mx-auto text-balance">
                                    Reviva os melhores momentos da nossa última mostra científica, onde a inovação e o protagonismo estudantil ganharam vida.
                                </p>
                            </div>
                            
                            <div className="w-full relative shadow-[0_0_80px_rgba(139,92,246,0.15)] rounded-[2.5rem] overflow-hidden bg-black p-1">
                                <div className="absolute inset-0 bg-gradient-to-tr from-violet-500 via-indigo-500 to-purple-500 rounded-[2.5rem] opacity-30 animate-pulse"></div>
                                <div className="video-container relative z-10 rounded-[2.3rem] border border-white/10">
                                    <iframe src={IMAGES.event_video_url} className="w-full h-full border-none" allow="autoplay; encrypted-media; fullscreen"></iframe>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* 5. CARROSSEL TECH */}
                    <section id="destaques" className="relative min-h-[600px] sm:min-h-[800px] flex items-center bg-[#0f172a] overflow-hidden bg-hero-carousel shadow-2xl mx-4 sm:mx-12 sm:rounded-[3rem] my-20 sm:my-32 text-white" style={{ backgroundImage: `url('${ARTICLES_DATA[activeSlide].bg}')` }}>
                        {/* Overlay Gradiente Escuro para legibilidade tech */}
                        <div className="absolute inset-0 bg-gradient-to-r from-[#0f172a] via-[#0f172a]/90 to-transparent"></div>
                        <div className="absolute inset-0 bg-gradient-to-t from-[#0f172a] via-transparent to-transparent opacity-80"></div>
                        
                        {/* Progress Bar High-Tech */}
                        <div className="absolute bottom-0 left-0 w-full h-2 bg-white/5 z-40 overflow-hidden">
                            <div className="h-full bg-violet-400 transition-all duration-100 ease-linear shadow-[0_0_15px_#a78bfa]" style={{ width: `${progress}%` }}></div>
                        </div>

                        <div className="absolute inset-x-0 top-1/2 -translate-y-1/2 flex justify-between px-4 sm:px-12 z-30 pointer-events-none">
                            <button onClick={prevSlide} className="w-12 h-12 sm:w-16 sm:h-16 flex items-center justify-center rounded-full glass-panel-dark text-white hover:bg-violet-500 hover:border-violet-400 transition-all pointer-events-auto active:scale-90"><Icon name="chevron-left" size={24} /></button>
                            <button onClick={nextSlide} className="w-12 h-12 sm:w-16 sm:h-16 flex items-center justify-center rounded-full glass-panel-dark text-white hover:bg-violet-500 hover:border-violet-400 transition-all pointer-events-auto active:scale-90"><Icon name="chevron-right" size={24} /></button>
                        </div>

                        <div className="relative max-w-7xl mx-auto px-8 sm:px-24 w-full z-10 py-20 sm:py-0">
                            <div key={`slide-${activeSlide}`} className="slide-content-enter max-w-4xl">
                                <div className="inline-flex items-center gap-3 px-5 py-2.5 rounded-full bg-violet-500/10 border border-violet-500/30 mb-8 backdrop-blur-md">
                                    <span className="relative flex h-3 w-3"><span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-violet-400 opacity-75"></span><span className="relative inline-flex rounded-full h-3 w-3 bg-violet-500"></span></span>
                                    <span className="text-[10px] font-black uppercase tracking-[0.2em] text-violet-300">Destaque Científico</span>
                                </div>
                                
                                <h2 className="modern-title text-4xl sm:text-6xl md:text-8xl font-black leading-[1.05] uppercase mb-8 text-white tracking-tighter text-balance drop-shadow-2xl">
                                    {ARTICLES_DATA[activeSlide].title}
                                </h2>
                                
                                <div className="flex flex-wrap gap-6 sm:gap-10 text-[11px] sm:text-xs uppercase font-bold tracking-[0.2em] text-slate-300 mb-12">
                                    <span className="flex items-center gap-3 bg-white/5 px-4 py-2 rounded-xl backdrop-blur-sm border border-white/10"><Icon name="compass" size={16} className="text-violet-400" /> {ARTICLES_DATA[activeSlide].area}</span>
                                    <span className="flex items-center gap-3 bg-white/5 px-4 py-2 rounded-xl backdrop-blur-sm border border-white/10"><Icon name="user-check" size={16} className="text-indigo-400" /> Prof. {ARTICLES_DATA[activeSlide].prof}</span>
                                </div>
                                
                                <div className="flex flex-col sm:flex-row gap-5">
                                    <button onClick={() => navigateTo('reader', ARTICLES_DATA[activeSlide])} className="btn-tech w-full sm:w-auto px-12 py-5 bg-violet-500 text-white font-black rounded-2xl hover:bg-violet-400 shadow-[0_0_30px_rgba(139,92,246,0.4)] text-[11px] sm:text-xs uppercase tracking-[0.2em] flex items-center justify-center">
                                        Ler Artigo Completo <Icon name="file-text" size={18} className="ml-3" />
                                    </button>
                                    <button onClick={() => navigateTo('banner', ARTICLES_DATA[activeSlide])} className="w-full sm:w-auto px-12 py-5 glass-panel-dark text-white font-black rounded-2xl hover:bg-white/10 text-[11px] sm:text-xs uppercase tracking-[0.2em] flex items-center justify-center transition-colors">
                                        Explorar Banner <Icon name="image" size={18} className="ml-3 text-violet-400" />
                                    </button>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* 6. JORNADA 2026 - SCIFI */}
                    <section id="jornada" className="py-24 sm:py-40 px-6 relative overflow-hidden bg-slate-50">
                        <div className="absolute right-0 top-0 w-1/2 h-full bg-gradient-to-l from-indigo-100/50 to-transparent pointer-events-none"></div>
                        
                        <div className="max-w-6xl mx-auto flex flex-col md:grid md:grid-cols-2 gap-16 items-center relative z-10">
                            <div className="space-y-8">
                                <div className="flex items-center gap-4 text-indigo-600">
                                    <div className="p-4 bg-indigo-100 rounded-2xl"><Icon name="rocket" size={32} /></div>
                                    <h2 className="academic-title text-4xl sm:text-6xl font-black tracking-tight uppercase leading-none text-slate-900">Jornada 2026</h2>
                                </div>
                                <p className="text-slate-500 text-xl font-light leading-relaxed text-balance">
                                    O amanhã da ciência já está sendo construído com novos compromissos, algoritmos e descobertas nos Itinerários Formativos. Prepare-se para a próxima fronteira do conhecimento.
                                </p>
                            </div>
                            
                            <div className="relative flex justify-center lg:justify-end">
                                <div className="relative p-2 rounded-[3rem] bg-gradient-to-tr from-indigo-600 to-violet-400 animate-pulse-slow shadow-2xl">
                                    <div className="bg-white p-10 sm:p-16 rounded-[2.8rem] flex flex-col items-center justify-center w-[280px] sm:w-[380px] aspect-square relative overflow-hidden text-center z-10">
                                        <div className="absolute inset-0 bg-grid-pattern opacity-10"></div>
                                        <Icon name="cpu" size={40} className="text-indigo-200 mb-6" />
                                        <span className="text-[10px] sm:text-xs font-black uppercase tracking-[0.4em] text-slate-400 block mb-4">Próximo Lançamento em</span>
                                        <h3 className="text-7xl sm:text-9xl font-black text-transparent bg-clip-text bg-gradient-to-r from-indigo-600 to-violet-500 uppercase tracking-tighter leading-none drop-shadow-sm">2026</h3>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>

                    <div className="w-full bg-[#0f172a] px-6 py-16 text-center text-slate-400 border-t border-slate-800">
                        <Icon name="hexagon" size={32} className="text-violet-500 mb-6 mx-auto opacity-70" />
                        <h3 className="academic-title text-xl sm:text-3xl font-bold italic text-white tracking-tight text-balance leading-snug">"A inovação começa com a curiosidade."</h3>
                        <div className="mt-8 text-[10px] sm:text-xs font-black uppercase tracking-[0.4em] text-slate-500">Colégio Ser! Sorocaba • Alfabetização Científica</div>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen bg-slate-50 text-slate-900 font-sans selection:bg-violet-200 selection:text-violet-900">
                    {view === 'home' && renderHome()}
                    {view === 'catalog' && renderCatalog()}
                    {view === 'reader' && renderReader()}
                    {view === 'banner' && renderBanner()}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

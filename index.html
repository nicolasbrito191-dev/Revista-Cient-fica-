<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Revista de Iniciação Científica - Colégio Ser!</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #ffffff; 
            margin: 0;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }
        .academic-title { font-family: 'Playfair Display', serif; }
        .modern-title { font-family: 'Inter', sans-serif; font-weight: 900; }
        
        .bg-hero-carousel {
            background-size: cover;
            background-position: center;
            transition: all 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .fade-in-up {
            animation: fadeInUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); filter: blur(10px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }

        .slide-content-enter {
            animation: slideIn 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(40px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .hover-lift {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .hover-lift:hover {
            transform: translateY(-8px) scale(1.01);
            box-shadow: 0 30px 60px -12px rgba(15, 23, 42, 0.2);
        }

        .img-paper-shadow {
            box-shadow: 0 25px 60px -15px rgba(15, 23, 42, 0.3);
            transition: all 0.6s ease;
        }

        .pdf-viewer-container {
            width: 100%;
            max-width: 1000px;
            height: 80vh; 
            min-height: 500px;
            background: #1a1f2e;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.6);
            position: relative;
        }
        
        @media (max-width: 640px) {
            .pdf-viewer-container {
                height: 70vh;
                min-height: 450px;
            }
        }

        .magazine-transition {
            transition: all 0.8s cubic-bezier(0.6, 0.05, 0.01, 0.9);
        }

        .btn-shimmer {
            position: relative;
            overflow: hidden;
        }
        .btn-shimmer::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent);
            transform: rotate(45deg);
            transition: 0.8s;
            pointer-events: none;
        }
        .btn-shimmer:hover::after {
            left: 150%;
        }

        .btn-action-pulse {
            animation: pulse-action 2s infinite;
        }
        @keyframes pulse-action {
            0% { box-shadow: 0 0 0 0 rgba(79, 70, 229, 0.7); }
            70% { box-shadow: 0 0 0 20px rgba(79, 70, 229, 0); }
            100% { box-shadow: 0 0 0 0 rgba(79, 70, 229, 0); }
        }

        .video-container {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 */
            height: 0;
            overflow: hidden;
            border-radius: 24px;
            background: #000;
        }
        .video-container iframe, .video-container video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .banner-overlay-btn {
            background: #4f46e5;
            color: white;
            padding: 14px 28px;
            border-radius: 99px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            font-size: 11px;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 15px 35px rgba(79, 70, 229, 0.4);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: #f8fafc; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 5px; border: 2px solid #f8fafc; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback, useRef } = React;

        // --- CONFIGURAÇÃO DE IMAGENS (PARA TROCAR A CAPA) ---
        const COVER_IMAGES = {
            2024: "https://lh7-rt.googleusercontent.com/sitesz/AClOY7pz2nRa1cCyR4ZTGfEK8WJ39oLERNS7PJEA42mtm9rYDl8ms-6_shb9Zm2SgI2CRO_SjBY9MIuyB5gcbV0ut-zOo_-gzE2jZrjGL5GDvnLs738q3ajmJHTYoK-62PM_CC7xKkoMJmE35WdMMOLbRQ-GXp9a0fBtsYgKWkf1Wdr-QPnHAlk?key=aCpffzizo07AapIHHMuf7A",
            2025: "" 
        };

        const ARTICLES_DATA = [
            { id: "propaganda", title: "Como a propaganda influencia os jovens contemporâneos", area: "Sistema Mundo", prof: "Naia Godoy Padovanni", authors: "Laura Almeida Duarte, Manuella Guimaro, Maria Eduarda Medeiros", bg: "https://lh3.googleusercontent.com/u/0/d/1MRcxEyyQbnOjy7TFA_RIzls0RkLWBApl=w1600", pdf: "https://drive.google.com/file/d/1X92V3yBTVRB_jnBhNRvzfvM4i1rIRzWe/preview", banner: "https://drive.google.com/file/d/1MRcxEyyQbnOjy7TFA_RIzls0RkLWBApl/view" },
            { id: "tecnologia", title: "Tecnologia e a organização empresarial", area: "Análise de Dados", prof: "Adriano Ortiz Souza", authors: "Ana Cristina Borges Martinis, Isadora Almeida Viveiros, Júlia de Souza", bg: "https://lh3.googleusercontent.com/u/0/d/1FNNBHpe5mIkRyhrNKjnRylqZQQTIcqj-=w1600", pdf: "https://drive.google.com/file/d/1JFnvQbYIA_lEDLD1AXMG_zDxt5xNoSsV/preview", banner: "https://drive.google.com/file/d/1FNNBHpe5mIkRyhrNKjnRylqZQQTIcqj-/view" },
            { id: "regicide", title: "Desenvolvimento do Jogo Regicide", area: "Análise de Dados", prof: "Adriano Ortiz Souza", authors: "Gabriel Garcia Flores", bg: "https://lh3.googleusercontent.com/u/0/d/1C0SuSb4ra1sQGwTQg5-SQIoZ3Vf9U6fF=w1600", pdf: "https://drive.google.com/file/d/1RZwnf4e0SEQvaH3b8pJpgRTEDTs8wv9R/preview", banner: "https://drive.google.com/file/d/1C0SuSb4ra1sQGwTQg5-SQIoZ3Vf9U6fF/view" },
            { id: "foguete", title: "Eco-Foguete: Dispersão de sementes", area: "Meio Ambiente", prof: "Gabriel Costa Soares", authors: "Isabela Mir de Campos Corrêa, Victor Cano Ronzani Pereira, Maria Eduarda Ramos Tagliaferro", bg: "https://lh3.googleusercontent.com/u/0/d/1Gz8kxtvNWUle02Hw2X3YmPFhG3zuyhPR=w1600", pdf: "https://drive.google.com/file/d/1WsYPze9P6WRoRWDL18A07xvElUgLXJ_h/preview", banner: "https://drive.google.com/file/d/1Gz8kxtvNWUle02Hw2X3YmPFhG3zuyhPR/view" },
            { id: "valvula", title: "Válvula de Controle Remoto", area: "Maker", prof: "Jose Eduardo Xavier", authors: "Nicolas Dias da Silva Carravero, João Vitor Israel de Oliveira Annibaldi, Lorenzo Pederiva Leite", bg: "https://lh3.googleusercontent.com/u/0/d/1teyhwUnb2x50RDN4P6e7K6Q_3fHBodgv=w1600", pdf: "https://drive.google.com/file/d/1n_TwNW_4W2Ie85CZ-m-wlWy-tfZsdGBM/preview", banner: "https://drive.google.com/file/d/1teyhwUnb2x50RDN4P6e7K6Q_3fHBodgv/view" },
            { id: "vento-ionico", title: "Geração de vento iônico", area: "Maker", prof: "Daniel Alisson Cardoso", authors: "Brenda Martines Tavares, Maria Eduarda de Santana Souza", bg: "https://lh3.googleusercontent.com/u/0/d/1fYyrVo2oTrNtXGpDgS8DY31mzMFOMWC8=w1600", pdf: "https://drive.google.com/file/d/1qUog4169272MvcUIaNxJEpPGDhA6IVpo/preview", banner: "https://drive.google.com/file/d/1fYyrVo2oTrNtXGpDgS8DY31mzMFOMWC8/view" },
            { id: "extremismo", title: "Disseminação de ideias extremistas", area: "Sistema Mundo", prof: "Naia Godoy Padovanni", authors: "Luísa Murata, João Botto, Ana Sofia Gretzitz, Eduardo Domingues, Lívia Todesco, Lavínia Welter", bg: "https://lh3.googleusercontent.com/u/0/d/1COBgBrgXH2XU4xzEgq15_WJ1lJmFceUp=w1600", pdf: "https://drive.google.com/file/d/1UMUjADuxJOip39tZjzvuoxgY16vdWMGS/preview", banner: "https://drive.google.com/file/d/1COBgBrgXH2XU4xzEgq15_WJ1lJmFceUp/view" }
        ];

        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => { if (window.lucide) lucide.createIcons(); }, [name]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        const App = () => {
            const [view, setView] = useState('home'); 
            const [selectedArticle, setSelectedArticle] = useState(null);
            const [activeSlide, setActiveSlide] = useState(0);
            const [activeMagazineYear, setActiveMagazineYear] = useState(2024);
            const [searchQuery, setSearchQuery] = useState('');

            const navigateTo = useCallback((page, article = null) => {
                setSelectedArticle(article);
                setView(page);
                window.scrollTo(0, 0);
            }, []);

            const goHome = useCallback(() => {
                setView('home');
                setSelectedArticle(null);
                setSearchQuery('');
                window.scrollTo(0, 0);
            }, []);

            const openCatalog = useCallback(() => {
                setView('catalog');
                setSelectedArticle(null);
                window.scrollTo(0, 0);
            }, []);

            const nextSlide = useCallback(() => {
                setActiveSlide((prev) => (prev + 1) % ARTICLES_DATA.length);
            }, []);

            const prevSlide = useCallback(() => {
                setActiveSlide((prev) => (prev - 1 + ARTICLES_DATA.length) % ARTICLES_DATA.length);
            }, []);

            const filteredArticles = useMemo(() => {
                const query = searchQuery.toLowerCase().trim();
                if (!query) return ARTICLES_DATA;
                return ARTICLES_DATA.filter(art => 
                    art.title.toLowerCase().includes(query) ||
                    art.authors.toLowerCase().includes(query) ||
                    art.prof.toLowerCase().includes(query) ||
                    art.area.toLowerCase().includes(query)
                );
            }, [searchQuery]);

            // --- VISTAS ESPECÍFICAS ---

            const renderCatalog = () => (
                <div className="w-full min-h-screen bg-[#f8fafc] page-transition text-left">
                    <div className="bg-[#151c32] text-white py-10 sm:py-16 px-4 sm:px-12 shadow-2xl relative overflow-hidden">
                        <div className="absolute top-0 right-0 w-96 h-96 bg-indigo-600/10 rounded-full blur-3xl -translate-y-1/2 translate-x-1/2"></div>
                        <div className="max-w-6xl mx-auto flex flex-col md:flex-row md:items-end justify-between gap-8 relative z-10">
                            <div className="text-left slide-content-enter">
                                <button onClick={goHome} className="flex items-center gap-2 text-indigo-400 font-black uppercase text-[10px] tracking-widest mb-6 hover:text-indigo-300 transition-all active:translate-x-[-4px]">
                                    <Icon name="arrow-left" size={14} /> Voltar ao Início
                                </button>
                                <h1 className="academic-title text-3xl sm:text-5xl font-black mb-1 uppercase leading-none">Revista Digital 2024</h1>
                                <p className="text-indigo-200/60 text-sm sm:text-base font-light mt-3 tracking-wide max-w-xl">Acervo completo das produções intelectuais desenvolvidas pelos nossos alunos.</p>
                            </div>
                            <div className="bg-white/10 px-5 py-4 rounded-2xl sm:rounded-3xl border border-white/10 flex items-center gap-4 w-full md:max-w-md shadow-2xl backdrop-blur-xl group focus-within:ring-2 ring-indigo-500 transition-all">
                                <Icon name="search" size={20} className="text-indigo-400 group-focus-within:scale-110 transition-transform" />
                                <input 
                                    type="text" 
                                    value={searchQuery} 
                                    onChange={(e) => setSearchQuery(e.target.value)} 
                                    placeholder="Pesquisar trabalho..." 
                                    className="bg-transparent border-none text-white text-sm sm:text-base focus:outline-none w-full placeholder-white/30 font-medium" 
                                />
                                {searchQuery && <button onClick={() => setSearchQuery('')} className="text-white/40 hover:text-white transition-all"><Icon name="x" size={18}/></button>}
                            </div>
                        </div>
                    </div>
                    <div className="max-w-7xl mx-auto px-4 sm:px-12 py-10 sm:py-24">
                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 sm:gap-10">
                            {filteredArticles.map((art, index) => (
                                <div key={art.id} className="bg-white rounded-[2rem] sm:rounded-[2.5rem] overflow-hidden shadow-sm border border-slate-100 hover-lift group fade-in-up" style={{ animationDelay: `${index * 0.05}s` }}>
                                    <div className="h-44 sm:h-56 overflow-hidden relative">
                                        <img src={art.bg} className="w-full h-full object-cover transition-transform duration-1000 group-hover:scale-110" alt={art.title} />
                                        <div className="absolute inset-0 bg-gradient-to-t from-slate-900/90 via-slate-900/20 to-transparent flex items-end p-5 sm:p-6">
                                            <span className="text-[9px] font-black bg-indigo-600 text-white px-3 py-1.5 rounded-lg uppercase tracking-widest shadow-lg">{art.area}</span>
                                        </div>
                                    </div>
                                    <div className="p-6 sm:p-8 text-left text-slate-900">
                                        <h3 className="academic-title text-lg sm:text-xl font-bold text-slate-800 mb-3 leading-tight min-h-[3rem] line-clamp-2 uppercase italic">{art.title}</h3>
                                        <p className="text-[11px] text-slate-500 font-medium italic mb-6 line-clamp-1 border-l-2 border-indigo-100 pl-3">{art.authors}</p>
                                        <div className="flex items-center gap-2 text-slate-400 text-[10px] font-black uppercase mb-8 pt-4 border-t border-slate-50"><Icon name="user-check" size={14} className="text-indigo-400" /> Prof. {art.prof}</div>
                                        <div className="grid grid-cols-2 gap-3 sm:gap-4">
                                            <button onClick={() => navigateTo('reader', art)} className="bg-[#151c32] text-white py-3 sm:py-3.5 rounded-2xl font-black text-[10px] uppercase hover:bg-indigo-600 transition-all active:scale-95 shadow-lg flex items-center justify-center">Ler Artigo</button>
                                            <button onClick={() => navigateTo('banner', art)} className="bg-slate-50 text-slate-700 py-3 sm:py-3.5 rounded-2xl font-black text-[10px] uppercase hover:bg-slate-200 transition-all active:scale-95 border border-slate-100 flex items-center justify-center">Ver Banner</button>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );

            const renderReader = () => (
                <div className="w-full min-h-screen bg-[#0f172a] page-transition flex flex-col items-center">
                    <div className="w-full bg-[#1e293b]/80 backdrop-blur-xl px-3 sm:px-6 py-4 flex items-center justify-between border-b border-white/5 sticky top-0 z-[100]">
                        <div className="flex items-center gap-3 flex-1 overflow-hidden">
                            <button onClick={() => setView('catalog')} className="p-2 hover:bg-white/10 rounded-full text-white transition active:scale-90 flex items-center justify-center shrink-0">
                                <Icon name="arrow-left" size={24} />
                            </button>
                            <div className="text-left text-white truncate max-w-full">
                                <h2 className="academic-title text-sm sm:text-lg font-bold leading-tight truncate">{selectedArticle.title}</h2>
                                <p className="text-[9px] sm:text-[10px] text-indigo-400 font-black uppercase tracking-widest leading-none mt-1">Edição 2024</p>
                            </div>
                        </div>
                        <div className="flex items-center gap-2 sm:gap-3 ml-2">
                            <a href={selectedArticle.pdf.replace('/preview', '/view')} target="_blank" rel="noopener noreferrer" className="bg-indigo-600 text-white px-3 sm:px-5 py-2.5 rounded-xl font-black text-[9px] sm:text-xs uppercase tracking-widest hover:bg-indigo-500 transition-all flex items-center justify-center gap-2 shadow-xl btn-action-pulse">
                                <Icon name="maximize-2" size={14} /> <span className="hidden xs:inline">TELA CHEIA</span>
                            </a>
                            <button onClick={() => setView('catalog')} className="bg-white/10 text-white px-3 sm:px-5 py-2.5 rounded-xl font-bold text-[9px] sm:text-xs uppercase hover:bg-white/20 transition flex items-center justify-center">Voltar</button>
                        </div>
                    </div>
                    <div className="flex-grow w-full p-2 sm:p-10 flex flex-col items-center bg-[#0a0d1a]">
                        <div className="pdf-viewer-container fade-in-up">
                            <iframe key={`pdf-${selectedArticle.id}`} src={`${selectedArticle.pdf}?authuser=0`} className="w-full h-full border-none" allow="autoplay"></iframe>
                        </div>
                    </div>
                </div>
            );

            const renderBanner = () => (
                <div className="w-full min-h-screen bg-[#0f172a] page-transition flex flex-col items-center text-white">
                    <div className="w-full px-3 sm:px-6 py-4 sm:py-5 flex items-center justify-between border-b border-white/5 bg-[#1e293b]/80 backdrop-blur-xl sticky top-0 z-50">
                        <button onClick={() => setView('catalog')} className="text-white/60 hover:text-white flex items-center gap-2 text-[10px] font-bold uppercase tracking-widest transition active:scale-95 shrink-0">
                            <Icon name="arrow-left" size={18} /> <span className="hidden sm:inline">Voltar à Revista</span>
                        </button>
                        <h2 className="academic-title text-white text-xs sm:text-xl font-bold uppercase tracking-tight text-center px-4 truncate">Visualização de Banner</h2>
                        <a href={selectedArticle.banner} target="_blank" rel="noopener noreferrer" className="bg-indigo-600 text-white px-3 sm:px-5 py-2.5 rounded-xl transition shadow-lg flex items-center justify-center gap-2 text-[10px] font-black uppercase tracking-widest btn-action-pulse shrink-0">
                            <Icon name="maximize-2" size={14} /> <span className="hidden xs:inline">TELA CHEIA</span>
                        </a>
                    </div>
                    <div className="flex-grow w-full max-w-7xl mx-auto flex flex-col lg:grid lg:grid-cols-12 gap-6 sm:gap-12 p-4 sm:p-12 items-center text-left">
                        <div className="w-full lg:col-span-8 flex justify-center relative group fade-in-up">
                            <div className="relative banner-glow w-full max-w-2xl lg:max-w-none text-left">
                                <div className="absolute -inset-2 bg-gradient-to-r from-indigo-500 to-purple-600 rounded-[2rem] blur opacity-25 transition duration-700 group-hover:opacity-50"></div>
                                <div className="relative bg-slate-900 rounded-2xl p-1.5 border border-white/10 shadow-2xl overflow-hidden text-center">
                                    <img src={selectedArticle.bg} className="w-full h-auto rounded-xl object-contain max-h-[50vh] lg:max-h-[75vh] mx-auto transition-transform duration-700" alt="Banner" />
                                    <div className="absolute bottom-6 right-6 z-20">
                                        <a href={selectedArticle.banner} target="_blank" rel="noopener noreferrer" className="banner-overlay-btn text-white font-black">
                                            <Icon name="maximize-2" size={16} /> Abrir Original
                                        </a>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div className="w-full lg:col-span-4 bg-white/[0.03] backdrop-blur-xl p-6 sm:p-10 rounded-[2rem] sm:rounded-[3rem] border border-white/10 text-left slide-content-enter">
                            <span className="text-indigo-400 text-[9px] font-black uppercase tracking-widest block mb-4 border-b border-indigo-400/20 pb-2">Informações do Projeto</span>
                            <h3 className="academic-title text-2xl sm:text-3xl font-bold leading-tight mb-6 uppercase italic text-white">{selectedArticle.title}</h3>
                            <div className="space-y-6">
                                <div className="bg-white/[0.02] p-4 rounded-2xl border border-white/5">
                                    <div className="flex items-center gap-2 text-slate-400 text-[9px] uppercase font-bold tracking-widest mb-2"><Icon name="users" size={12} className="text-indigo-400" /> Autoria</div>
                                    <p className="text-sm font-medium italic text-slate-200">{selectedArticle.authors}</p>
                                </div>
                                <div className="grid grid-cols-2 gap-4 pt-4 border-t border-white/5">
                                    <div className="text-left text-white"><div className="text-slate-400 text-[9px] uppercase font-bold tracking-widest mb-1">Itinerário</div><div className="text-indigo-200 font-bold uppercase text-[10px] leading-tight">{selectedArticle.area}</div></div>
                                    <div className="text-right text-white"><div className="text-slate-400 text-[9px] uppercase font-bold tracking-widest mb-1">Orientador</div><div className="text-slate-200 font-bold uppercase text-[10px] leading-tight">{selectedArticle.prof}</div></div>
                                </div>
                            </div>
                            <div className="mt-10 flex flex-col gap-4">
                                <a href={selectedArticle.banner} target="_blank" rel="noopener noreferrer" className="w-full bg-white text-[#151c32] font-black py-4 rounded-2xl transition-all shadow-xl flex items-center justify-center gap-3 uppercase text-[10px] hover:bg-indigo-50 btn-shimmer"><Icon name="image" size={18} /> VER ORIGINAL (HD)</a>
                                <button onClick={() => navigateTo('reader', selectedArticle)} className="w-full bg-indigo-600/20 border border-indigo-600/30 text-indigo-400 hover:bg-indigo-600 hover:text-white font-bold py-4 rounded-2xl transition-all flex items-center justify-center gap-3 uppercase text-[10px]">Ler Artigo Completo</button>
                            </div>
                        </div>
                    </div>
                </div>
            );

            // --- VISTA INICIAL ---
            const renderHome = () => (
                <div className="text-left page-transition w-full">
                    {/* LOGOTIPO SER! NO TOPO */}
                    <div className="py-6 sm:py-10 px-4 sm:px-12 flex justify-center sm:justify-start max-w-7xl mx-auto fade-in-up">
                        <img 
                            src="https://lh3.googleusercontent.com/u/0/d/1X92V3yBTVRB_jnBhNRvzfvM4i1rIRzWe/view" 
                            alt="Logótipo Colégio Ser!" 
                            className="h-10 sm:h-16 w-auto object-contain brightness-0" 
                            style={{ filter: 'invert(14%) sepia(21%) saturate(3736%) hue-rotate(205deg) brightness(91%) contrast(92%)' }}
                        />
                    </div>

                    <section className="py-12 sm:py-28 px-4 sm:px-12 text-center text-slate-900 fade-in-up">
                        <div className="inline-flex items-center gap-3 mb-8">
                            <div className="h-px w-8 sm:w-16 bg-indigo-600"></div>
                            <span className="text-[10px] sm:text-[11px] font-black uppercase tracking-[0.5em] text-indigo-600 font-bold">Iniciação Científica</span>
                            <div className="h-px w-8 sm:w-16 bg-indigo-600"></div>
                        </div>
                        <h2 className="academic-title text-4xl sm:text-7xl font-black text-[#151c32] mb-8 leading-tight uppercase">Boas-Vindas à nossa <br/><span className="text-indigo-600 italic">Revista Científica</span></h2>
                        <p className="text-slate-500 text-lg sm:text-2xl font-light max-w-4xl mx-auto text-balance">A excelência acadêmica em cada detalhe. Explore a produção intelectual de nossos estudantes.</p>
                    </section>

                    <section className="bg-slate-50/50 py-12 sm:py-32 border-y border-slate-100 overflow-hidden px-4 sm:px-12 text-left fade-in-up">
                        <div className="max-w-6xl mx-auto flex flex-col lg:flex-row items-center gap-12 lg:gap-28">
                            <div className="w-full lg:w-2/5 flex flex-col items-center">
                                <div className="relative w-full max-w-[280px] sm:max-w-[360px] h-[380px] sm:h-[480px]">
                                    <div className={`absolute inset-0 magazine-transition ${activeMagazineYear === 2024 ? 'opacity-100 scale-100 rotate-0' : 'opacity-0 scale-90 -rotate-12 pointer-events-none'}`}>
                                        <img src={COVER_IMAGES[2024]} className="w-full h-full object-cover img-paper-shadow border-[8px] sm:border-[10px] border-white rounded-sm" />
                                        <div className="absolute -bottom-4 -right-4 bg-indigo-600 text-white px-6 sm:px-8 py-2 sm:py-3 rounded-2xl shadow-2xl border-4 border-white/10 font-black italic text-sm sm:text-base">2024</div>
                                    </div>
                                    <div className={`absolute inset-0 magazine-transition ${activeMagazineYear === 2025 ? 'opacity-100 scale-100 rotate-0' : 'opacity-0 scale-90 rotate-12 pointer-events-none'}`}>
                                        <div className="w-full h-full bg-white border-[10px] border-white rounded-sm img-paper-shadow flex flex-col items-center justify-center p-8 text-slate-300">
                                            <Icon name="lock" size={64} className="mb-6 opacity-20 text-indigo-600" /><h4 className="academic-title text-4xl font-black opacity-30 mb-2">2025</h4><span className="text-[9px] font-black uppercase tracking-[0.4em] bg-slate-50 text-slate-400 px-6 py-2 rounded-full shadow-inner border border-slate-100">Em Breve</span>
                                        </div>
                                    </div>
                                </div>
                                <div className="mt-10 flex flex-row items-center gap-4 bg-white p-2 rounded-full border border-slate-200 shadow-xl">
                                    <span className="text-[9px] font-black text-slate-400 uppercase tracking-widest px-4 border-r border-slate-200">Volume</span>
                                    <div className="flex gap-1.5">{[2024, 2025].map(year => (<button key={year} onClick={() => setActiveMagazineYear(year)} className={`w-10 h-10 rounded-full flex items-center justify-center transition-all font-black text-xs italic ${activeMagazineYear === year ? 'bg-[#151c32] text-white shadow-xl scale-110' : 'bg-transparent text-slate-400 hover:bg-slate-50'}`}>{year.toString().slice(-2)}</button>))}</div>
                                </div>
                            </div>
                            <div className="w-full lg:w-3/5 space-y-8 text-center lg:text-left text-slate-900">
                                <div className="space-y-6 text-left">
                                    <div className="flex items-center justify-center lg:justify-start gap-4 text-indigo-600 font-black"><Icon name={activeMagazineYear === 2024 ? "book-marked" : "hourglass"} size={32} className="text-indigo-600" /><h2 className="academic-title text-3xl sm:text-5xl font-black text-slate-900 leading-none uppercase tracking-tight">Edição {activeMagazineYear}</h2></div>
                                    <p className="text-slate-500 text-lg sm:text-xl leading-relaxed font-light italic max-w-xl mx-auto lg:mx-0">
                                        {activeMagazineYear === 2024 
                                            ? "A edição de 2024 da Revista de Iniciação Científica do Colégio Ser Sorocaba reúne os principais projetos pelos alunos dos Itinerários Formativos, refletindo o compromisso com a pesquisa, a inovação e o pensamento crítico."
                                            : "Aguarde o lançamento da nossa nova edição em desenvolvimento."}
                                    </p>
                                </div>
                                {activeMagazineYear === 2024 ? (
                                    <button onClick={openCatalog} className="w-full max-w-sm py-4 sm:py-5 bg-[#151c32] text-white font-black rounded-[1.5rem] text-[11px] sm:text-sm uppercase tracking-[0.3em] hover:bg-indigo-600 transition-all shadow-2xl flex items-center justify-center gap-4 active:scale-95 btn-shimmer">EXPLORAR REVISTA <Icon name="book-open" size={20} /></button>
                                ) : (
                                    <div className="inline-flex items-center gap-4 text-slate-400 font-black uppercase text-[10px] tracking-widest border-2 border-dashed border-slate-200 px-8 py-5 rounded-[1.5rem] bg-white/50 backdrop-blur-sm">Publicação em curso</div>
                                )}
                            </div>
                        </div>
                    </section>

                    {/* DESTAQUES DINÂMICOS (MAIS PREENCHIDO NO MOBILE) */}
                    <section className="relative min-h-[550px] sm:min-h-[700px] flex items-center bg-[#151c32] overflow-hidden bg-hero-carousel shadow-inner mx-0 sm:mx-12 sm:rounded-[4rem] my-0 sm:my-32 text-left fade-in-up" style={{ backgroundImage: `linear-gradient(to right, rgba(21, 28, 50, 0.98), rgba(21, 28, 50, 0.7)), url('${ARTICLES_DATA[activeSlide].bg}')` }}>
                        <div className="absolute inset-x-0 top-1/2 -translate-y-1/2 flex justify-between px-3 sm:px-14 z-30 pointer-events-none text-white">
                            <button onClick={prevSlide} className="w-10 h-10 sm:w-16 sm:h-16 flex items-center justify-center rounded-full bg-white/10 border border-white/20 text-white hover:bg-indigo-600 transition-all pointer-events-auto backdrop-blur-md active:scale-90"><Icon name="chevron-left" size={20} /></button>
                            <button onClick={nextSlide} className="w-10 h-10 sm:w-16 sm:h-16 flex items-center justify-center rounded-full bg-white/10 border border-white/20 text-white hover:bg-indigo-600 transition-all pointer-events-auto backdrop-blur-md active:scale-90"><Icon name="chevron-right" size={20} /></button>
                        </div>
                        <div className="relative max-w-6xl mx-auto px-6 sm:px-20 w-full z-10 text-left py-20 sm:py-0">
                            <div key={`slide-${activeSlide}`} className="slide-content-enter text-white">
                                <div className="inline-flex items-center gap-2 px-4 py-2 bg-indigo-500/20 rounded-full border border-indigo-500/30 mb-6 text-white font-black"><Icon name="award" size={14} className="text-indigo-300" /><span className="text-[10px] font-black uppercase tracking-widest text-indigo-200">Destaque Científico</span></div>
                                <h2 className="modern-title text-3xl sm:text-5xl md:text-7xl font-black leading-[1.1] uppercase max-w-4xl mb-8 text-white tracking-tighter text-balance">
                                    {ARTICLES_DATA[activeSlide].title}
                                </h2>
                                <div className="flex flex-wrap gap-4 sm:gap-8 text-[10px] uppercase font-black tracking-[0.2em] text-indigo-300/80 mb-10">
                                    <span className="flex items-center gap-2 text-white border-b border-indigo-500/30 pb-1 font-black"><Icon name="book" size={14}/> {ARTICLES_DATA[activeSlide].area}</span>
                                    <span className="flex items-center gap-2 text-white border-b border-indigo-500/30 pb-1 font-black"><Icon name="user-check" size={14}/> Prof. {ARTICLES_DATA[activeSlide].prof}</span>
                                </div>
                                <div className="flex flex-col sm:flex-row gap-4">
                                    <button onClick={() => navigateTo('reader', ARTICLES_DATA[activeSlide])} className="w-full sm:w-auto px-10 py-4.5 sm:py-5.5 bg-indigo-600 text-white font-black rounded-2xl hover:bg-indigo-500 transition-all shadow-2xl text-[11px] sm:text-xs uppercase tracking-[0.2em] active:scale-95 flex items-center justify-center btn-shimmer">LER ARTIGO <Icon name="file-text" size={18} className="ml-2" /></button>
                                    <button onClick={() => navigateTo('banner', ARTICLES_DATA[activeSlide])} className="w-full sm:w-auto px-10 py-4.5 sm:py-5.5 bg-white/5 border border-white/20 text-white font-black rounded-2xl hover:bg-white/10 transition-all text-[11px] sm:text-xs uppercase tracking-[0.2em] backdrop-blur-md active:scale-95 flex items-center justify-center">VER BANNER <Icon name="image" size={18} className="ml-2" /></button>
                                </div>
                            </div>
                        </div>
                    </section>

                    <section className="bg-slate-900 py-20 sm:py-32 px-4 sm:px-12 text-left text-white relative overflow-hidden fade-in-up">
                        <div className="absolute bottom-0 right-0 w-full h-full bg-gradient-to-t from-indigo-600/5 to-transparent"></div>
                        <div className="max-w-6xl mx-auto flex flex-col md:grid md:grid-cols-2 gap-16 items-center relative z-10">
                            <div className="space-y-8 text-left">
                                <div className="flex items-center gap-4 text-indigo-400 font-black text-left"><Icon name="calendar-days" size={32} /><h2 className="academic-title text-3xl sm:text-6xl font-black tracking-tight uppercase text-white leading-none">Jornada 2026</h2></div>
                                <p className="text-slate-400 text-lg sm:text-2xl font-light leading-relaxed text-balance">O amanhã da ciência já está sendo construído com novos compromissos e descobertas.</p>
                                <div className="inline-flex items-center gap-4 p-5 bg-white/5 rounded-3xl border border-white/10 shadow-2xl backdrop-blur-md"><Icon name="hourglass" size={24} className="text-indigo-400 animate-spin-slow" /><span className="text-[11px] sm:text-xs font-black text-slate-300 uppercase tracking-widest leading-none">Em Desenvolvimento</span></div>
                            </div>
                            <div className="relative flex justify-center lg:justify-end text-center group">
                                <div className="bg-white p-10 sm:p-14 rounded-[4rem] sm:rounded-[6rem] shadow-2xl flex flex-col items-center justify-center w-[280px] h-[280px] sm:w-[350px] sm:h-[350px] border border-white/10 transition-all duration-700 hover:scale-105 text-[#151c32] overflow-hidden">
                                    <span className="text-[10px] font-black uppercase tracking-[0.4em] text-slate-400 block mb-4 text-center leading-tight">Próximo Volume em</span>
                                    <h3 className="academic-title text-7xl sm:text-9xl font-black text-[#151c32] uppercase tracking-tighter leading-none text-center">2026</h3>
                                    <div className="h-2 w-16 bg-indigo-600 mx-auto mt-8 rounded-full opacity-30"></div>
                                </div>
                            </div>
                        </div>
                    </section>

                    <div className="max-w-5xl mx-auto px-6 py-20 sm:py-32 text-center border-t border-slate-50 fade-in-up text-slate-800">
                        <Icon name="heart" size={40} className="text-indigo-600 mb-8 mx-auto opacity-70 animate-pulse text-indigo-600" />
                        <h3 className="academic-title text-xl sm:text-4xl font-bold italic text-slate-800 tracking-tight text-balance leading-snug">"O melhor caminho é o que fazemos juntos"</h3>
                        <div className="mt-12 text-[10px] font-black uppercase tracking-[0.4em] text-slate-300">Colégio Ser! Sorocaba • Alfabetização Científica</div>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen bg-white">
                    {view === 'home' ? renderHome() : null}
                    {view === 'catalog' ? renderCatalog() : null}
                    {view === 'reader' ? renderReader() : null}
                    {view === 'banner' ? renderBanner() : null}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
